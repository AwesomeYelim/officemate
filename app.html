<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OfficeMate — 앱 프로토타입</title>
<style>
  /* ===================================================================
     DESIGN TOKENS — lifted from C:\workspace\officemate\spec.html :root
     (spec.html is the source of truth; keep these in sync if it changes)
     =================================================================== */
  :root {
    --bg: #EDF1F9;
    --ink: #0E1430;
    --ink2: #4A5170;
    --muted: #8892AE;
    --muted2: #9AA3BE;
    --line: #D6DEEF;
    --card: #FFFFFF;
    --brand: #2F5EDB;
    --brand-dark: #1B3EA8;
    --brand-grad-a: #4C7DF5;
    --brand-grad-b: #2F5EDB;
    --good: #22A06B;
    --good-dark: #1C7F55;
    --warn: #F0A64E;
    --danger: #E05A5A;
    --purple: #7C5CC4;
    --banner: #7A1F2B;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #0b1022;
    color: var(--ink);
    min-height: 100vh;
  }
  h1, h2, h3, p, ul { margin: 0; }
  a { color: var(--brand); text-decoration: none; }
  button { font-family: inherit; }

  /* ---------- shared component classes (catalog — see CONTRACT.md) ---------- */
  .om-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--brand); color: #fff; border: none; border-radius: 999px;
    padding: 11px 16px; font-size: 13px; font-weight: 700; width: 100%; cursor: pointer;
  }
  .om-btn.secondary { background: #fff; color: var(--brand); border: 1.5px solid var(--brand); }
  .om-btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .om-btn.danger { background: var(--danger); color: #fff; }
  .om-btn:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
  .om-btn.auto { width: auto; padding: 9px 18px; }
  .om-press { transition: transform .15s cubic-bezier(.2,.8,.2,1); }
  .om-press:active { transform: scale(.96); }

  .om-card {
    background: #fff; border-radius: 16px; padding: 14px; margin-bottom: 10px;
    box-shadow: 0 8px 20px -14px rgba(20,40,110,.35);
  }
  .om-chip {
    display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700;
    padding: 3px 9px; border-radius: 999px;
  }
  .om-chip.blue { background: rgba(47,94,219,.12); color: var(--brand-dark); }
  .om-chip.green { background: rgba(34,160,107,.14); color: var(--good-dark); }
  .om-chip.amber { background: rgba(240,166,78,.16); color: #8A5A16; }
  .om-chip.red { background: rgba(224,90,90,.14); color: #A32E2E; }
  .om-chip.grey { background: #EEF1F8; color: var(--muted); }

  .om-gauge { height: 8px; border-radius: 5px; background: #EEF1F8; overflow: hidden; }
  .om-gauge > i { display: block; height: 100%; background: var(--brand); }

  .om-toast {
    position: absolute; left: 16px; right: 16px; bottom: 78px; z-index: 40;
    background: var(--ink); color: #fff; font-size: 11.5px; font-weight: 700;
    padding: 10px 14px; border-radius: 12px; text-align: center;
    box-shadow: 0 10px 24px -10px rgba(0,0,0,.5);
    animation: omToastIn .25s ease both;
  }
  @keyframes omToastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .om-bubble { background: #E9EEFB; color: var(--ink); font-size: 12px; line-height: 1.55; border-radius: 14px 14px 14px 4px; padding: 10px 13px; margin-bottom: 10px; max-width: 92%; }
  .om-bubble.bot { background: #fff; border: 1px solid #E4E9F5; }
  .skel-line { height: 10px; border-radius: 6px; background: #E4E9F5; margin-bottom: 8px; }
  @media (prefers-reduced-motion: no-preference) {
    .skel { animation: omPulse 1.1s ease-in-out infinite; }
    @keyframes omPulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  }

  .om-status {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px 2px; font-size: 12px; font-weight: 700; color: var(--ink); flex: none;
  }
  .om-appbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px 12px; flex: none; }
  .om-logo {
    width: 26px; height: 26px; border-radius: 9px; flex: none;
    background: linear-gradient(150deg, var(--brand-grad-a), var(--brand-grad-b));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 14px -4px rgba(47,94,219,.6);
  }
  .om-appbar-title { font-size: 12.5px; font-weight: 800; }
  .om-appbar-sub { font-size: 10.5px; color: var(--muted); }
  .om-appbar-back {
    width: 30px; height: 30px; border-radius: 50%; border: none; background: #fff;
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex: none;
    box-shadow: 0 4px 10px -6px rgba(20,40,110,.4);
  }
  .om-body { flex: 1; padding: 6px 16px 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .om-stepper { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 14px; }
  .om-stepper .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); }
  .om-stepper .dot.done { background: var(--good); }
  .om-stepper .dot.now { background: var(--brand); width: 10px; height: 10px; }

  .om-qr {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; width: 132px; height: 132px;
    margin: 0 auto; padding: 10px; background: #fff; border-radius: 12px;
  }
  .om-qr span.on { background: var(--ink); border-radius: 1px; }
  .om-qr span.off { background: transparent; }

  /* ---------- placeholder (module-not-loaded) ---------- */
  .om-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; padding: 40px 24px; color: var(--muted); }
  .om-placeholder .tag { font-family: monospace; font-size: 11px; background: #EEF1F8; color: var(--ink2); border-radius: 8px; padding: 4px 8px; margin-top: 10px; }

  /* ===================================================================
     APP FRAME — phone bezel on desktop, full-screen on mobile
     =================================================================== */
  #omStage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% -10%, #182246, #0b1022 60%);
    padding: 28px 12px;
  }
  #omDevice {
    width: 390px; max-width: 100%; flex: none;
    background: linear-gradient(160deg,#1a2440,#0b1022);
    border-radius: 44px; padding: 10px;
    box-shadow: 0 40px 90px -30px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.06);
  }
  #omViewport {
    background: var(--bg); border-radius: 34px; overflow: hidden;
    height: 800px; max-height: calc(100vh - 56px);
    display: flex; flex-direction: column; position: relative;
  }
  @media (max-width: 640px) {
    #omStage { padding: 0; background: var(--bg); }
    #omDevice { width: 100%; height: 100vh; border-radius: 0; padding: 0; box-shadow: none; background: none; }
    #omViewport { height: 100%; max-height: none; border-radius: 0; }
  }

  #omScreenStack { position: relative; flex: 1; overflow: hidden; }
  .om-screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    background: var(--bg); overflow: hidden;
  }
  @media (prefers-reduced-motion: no-preference) {
    .om-screen.slide-in-fwd { transform: translateX(100%); }
    .om-screen.slide-in-back { transform: translateX(-100%); }
    .om-screen.slide-settle { transform: translateX(0); transition: transform .28s cubic-bezier(.2,.8,.2,1); }
    .om-screen.slide-out-fwd { transform: translateX(-30%); transition: transform .28s cubic-bezier(.2,.8,.2,1); opacity: .7; }
    .om-screen.slide-out-back { transform: translateX(100%); transition: transform .28s cubic-bezier(.2,.8,.2,1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .om-screen.slide-in-fwd, .om-screen.slide-in-back { transform: none; }
  }

  #omTabbar { display: flex; border-top: 1px solid #E4E9F5; background: #fff; flex: none; }
  .om-tab {
    flex: 1; text-align: center; padding: 9px 4px 10px; font-size: 10.5px; color: var(--muted);
    border: none; background: none; cursor: pointer; display: flex; flex-direction: column; gap: 3px; align-items: center;
    position: relative;
  }
  .om-tab.active { color: var(--brand); font-weight: 700; }
  .om-tab .badge-dot {
    position: absolute; top: 2px; right: 22%; min-width: 15px; height: 15px; border-radius: 999px;
    background: var(--danger); color: #fff; font-size: 9px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; padding: 0 3px;
  }

  #omSimBar {
    position: absolute; top: 6px; left: 6px; right: 6px; z-index: 1000;
    display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700;
    background: rgba(14,20,48,.72); color: #fff; border-radius: 999px; padding: 4px 8px;
    pointer-events: none; opacity: 0; transition: opacity .2s ease;
  }
  #omSimBar.show { pointer-events: auto; opacity: 1; }
  #omSimBar button { pointer-events: auto; background: rgba(255,255,255,.16); border: none; color: #fff; border-radius: 999px; padding: 3px 8px; font-size: 10px; font-weight: 800; cursor: pointer; }
</style>
<style>
  /* ---- mod-a-onboarding.html ---- */
  /* ============================================================
     Group A — onboarding / settings / profile-edit
     Scoped classes: om-scr-onb-*, om-scr-set-*, om-scr-ped-*
     ============================================================ */
  .om-scr-onb-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 4px;
    border-bottom: 1px solid #EEF1F8; cursor: pointer;
  }
  .om-scr-onb-item:last-child { border-bottom: none; }
  .om-scr-onb-box {
    width: 20px; height: 20px; border-radius: 6px; border: 1.6px solid var(--line);
    display: flex; align-items: center; justify-content: center; flex: none; background: #fff;
  }
  .om-scr-onb-box.on { background: var(--brand); border-color: var(--brand); }
  .om-scr-onb-label { font-size: 12.5px; font-weight: 600; color: var(--ink); flex: 1; }
  .om-scr-onb-tag-req { font-size: 10px; font-weight: 700; color: var(--danger); margin-left: 4px; }
  .om-scr-onb-tag-opt { font-size: 10px; font-weight: 700; color: var(--muted); margin-left: 4px; }
  .om-scr-onb-detail { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

  .om-scr-onb-chiprow { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
  .om-scr-onb-tagchip {
    font-size: 11.5px; font-weight: 700; padding: 7px 13px; border-radius: 999px;
    border: 1.4px solid var(--line); background: #fff; color: var(--ink2); cursor: pointer;
  }
  .om-scr-onb-tagchip.on { background: rgba(47,94,219,.12); border-color: var(--brand); color: var(--brand-dark); }

  .om-scr-onb-seg { display: flex; gap: 7px; margin-top: 8px; }
  .om-scr-onb-segbtn {
    flex: 1; text-align: center; font-size: 12px; font-weight: 700; padding: 9px 6px;
    border-radius: 10px; border: 1.4px solid var(--line); background: #fff; color: var(--ink2); cursor: pointer;
  }
  .om-scr-onb-segbtn.on { background: var(--brand); border-color: var(--brand); color: #fff; }

  .om-scr-onb-bio {
    width: 100%; border: 1.4px solid var(--line); border-radius: 12px; padding: 10px 12px;
    font-size: 12.5px; font-family: inherit; resize: none; margin-top: 8px; color: var(--ink);
  }
  .om-scr-onb-bio:focus { outline: none; border-color: var(--brand); }
  .om-scr-onb-label-sm { font-size: 11.5px; font-weight: 800; color: var(--ink2); margin-top: 14px; }
  .om-scr-onb-label-sm:first-child { margin-top: 0; }

  .om-scr-set-row {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 2px;
    border-bottom: 1px solid #EEF1F8;
  }
  .om-scr-set-row:last-child { border-bottom: none; }
  .om-scr-set-row-txt { font-size: 12.5px; font-weight: 700; color: var(--ink); }
  .om-scr-set-row-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .om-scr-set-switch {
    width: 40px; height: 24px; border-radius: 999px; background: var(--line); position: relative;
    border: none; cursor: pointer; flex: none;
  }
  .om-scr-set-switch.on { background: var(--brand); }
  .om-scr-set-switch i {
    position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: transform .15s ease; box-shadow: 0 2px 4px rgba(0,0,0,.25);
  }
  .om-scr-set-switch.on i { transform: translateX(16px); }
  .om-scr-set-simbox { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .om-scr-set-navrow {
    display: flex; align-items: center; justify-content: space-between; padding: 13px 2px; cursor: pointer;
  }

  .om-scr-ped-field { margin-top: 12px; }
  .om-scr-ped-field label { font-size: 11px; font-weight: 800; color: var(--ink2); display: block; margin-bottom: 5px; }
  .om-scr-ped-input {
    width: 100%; border: 1.4px solid var(--line); border-radius: 10px; padding: 9px 12px;
    font-size: 12.5px; font-family: inherit; color: var(--ink);
  }
  .om-scr-ped-input.err { border-color: var(--danger); }
  .om-scr-ped-input:focus { outline: none; border-color: var(--brand); }
  .om-scr-ped-errtxt { font-size: 10.5px; color: var(--danger); font-weight: 700; margin-top: 4px; }
  .om-scr-ped-empty { font-size: 11px; color: var(--muted); padding: 6px 2px; }
</style>
<style>
  /* ---- mod-b-home.html ---- */
  /* ---- home (봇 채팅) ---- */
  .om-hc-composer { display: flex; gap: 8px; padding: 10px 16px 14px; background: var(--bg); flex: none; align-items: center; }
  .om-hc-input { flex: 1; border: 1px solid var(--line); border-radius: 999px; padding: 10px 14px; font-size: 12.5px; background: #fff; color: var(--ink); outline: none; }
  .om-hc-send { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--brand); display: flex; align-items: center; justify-content: center; flex: none; cursor: pointer; }
  .om-hc-examples { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px; }
  .om-hc-chipbtn { border: none; cursor: pointer; }
  .om-hc-stepper-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .om-hc-slot-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .om-hc-slot-tab { flex: 1; border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 7px 0; font-size: 11.5px; font-weight: 700; color: var(--muted); cursor: pointer; }
  .om-hc-slot-tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .om-hc-slotgrid { display: flex; flex-wrap: wrap; gap: 6px; }
  .om-hc-slotchip { border: none; cursor: pointer; }

  /* ---- room-chat (개별 모임 방 채팅) ---- */
  .om-rc-composer { display: flex; gap: 8px; padding: 10px 16px 14px; background: var(--bg); flex: none; align-items: center; }
  .om-rc-input { flex: 1; border: 1px solid var(--line); border-radius: 999px; padding: 10px 14px; font-size: 12.5px; background: #fff; color: var(--ink); outline: none; }
  .om-rc-send { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--brand); display: flex; align-items: center; justify-content: center; flex: none; cursor: pointer; }
</style>
<style>
  /* ---- mod-c-lifecycle.html ---- */
  /* Group C (lifecycle) — scoped classes, prefix om-c- */
  .om-c-avatar {
    width: 30px; height: 30px; border-radius: 50%; background: #E9EEFB; color: var(--brand-dark);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;
    flex: none;
  }
  .om-c-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #EEF1F8; }
  .om-c-row:last-child { border-bottom: none; }
  .om-c-name { font-size: 12.5px; font-weight: 700; color: var(--ink); }
  .om-c-sub { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .om-c-tabbar { display: flex; gap: 6px; margin-bottom: 12px; }
  .om-c-tabbtn {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 10px; font-size: 11.5px; font-weight: 700;
    background: #fff; color: var(--muted); border: 1px solid var(--line); cursor: pointer;
  }
  .om-c-tabbtn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .om-c-chipbtn {
    border: 1.5px solid var(--line); background: #fff; color: var(--ink2); border-radius: 999px;
    padding: 7px 13px; font-size: 11.5px; font-weight: 700; cursor: pointer;
  }
  .om-c-chipbtn.active { border-color: var(--brand); background: rgba(47,94,219,.10); color: var(--brand-dark); }
  .om-c-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 30px 10px; }
  .om-c-receiptrow { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; color: var(--ink2); }
  .om-c-receiptrow b { color: var(--ink); }
  .om-c-seqitem { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 6px 0; color: var(--muted2); }
  .om-c-seqitem.done { color: var(--good-dark); font-weight: 700; }
  .om-c-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); flex: none; }
  .om-c-dot.done { background: var(--good); }
</style>
<style>
  /* ---- mod-d-explore.html ---- */
  /* ============================================================
     Group D — explore / room-preview / sponsor-offer / sponsor-register
     All classes scoped with om-scr-<route>- prefixes. Reuses shared
     .om-card / .om-chip / .om-btn / .om-press / .om-gauge / .om-toast
     from shell.html — do not redefine those here.
     ============================================================ */

  /* ---- explore feed ---- */
  .om-scr-explore-filterbar { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
  .om-scr-explore-filterbtn {
    flex: none; font-size: 11.5px; font-weight: 700; padding: 7px 13px; border-radius: 999px;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink2); cursor: pointer;
  }
  .om-scr-explore-filterbtn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .om-scr-explore-roomtitle { font-weight: 800; font-size: 14px; color: var(--ink); }
  .om-scr-explore-metarow { display: flex; align-items: center; gap: 6px; margin: 6px 0 8px; flex-wrap: wrap; }
  .om-scr-explore-tagrow { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .om-scr-explore-bottomrow { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
  .om-scr-explore-count { font-size: 11px; color: var(--muted); font-weight: 700; }
  .om-scr-explore-sponsorcard { border: 1.5px solid rgba(240,166,78,.5); background: linear-gradient(160deg, rgba(240,166,78,.08), #fff); }
  .om-scr-explore-empty { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 46px 20px; color: var(--muted); }
  .om-scr-explore-empty .headline { font-weight: 800; font-size: 13.5px; color: var(--ink); margin-top: 10px; }
  .om-scr-explore-empty .sub { font-size: 11.5px; margin-top: 4px; line-height: 1.5; }
  .om-scr-explore-fab {
    position: absolute; right: 16px; bottom: 20px; z-index: 30; width: auto; padding: 12px 18px;
    box-shadow: 0 12px 24px -8px rgba(47,94,219,.55);
  }
  .om-scr-explore-registerbanner {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 14px;
    background: linear-gradient(150deg, var(--brand-grad-a), var(--brand-grad-b)); color: #fff;
    margin-top: 6px; cursor: pointer;
  }
  .om-scr-explore-registerbanner .t1 { font-size: 12.5px; font-weight: 800; }
  .om-scr-explore-registerbanner .t2 { font-size: 10.5px; opacity: .85; margin-top: 2px; }

  /* ---- room-preview ---- */
  .om-scr-preview-hero { text-align: center; padding: 6px 0 4px; }
  .om-scr-preview-hero .title { font-size: 16px; font-weight: 800; color: var(--ink); margin-top: 8px; }
  .om-scr-preview-hero .slot { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .om-scr-preview-avatars { display: flex; justify-content: center; margin: 14px 0 6px; }
  .om-scr-preview-avatar {
    width: 34px; height: 34px; border-radius: 50%; background: var(--brand); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;
    margin-left: -8px; border: 2px solid #fff; flex: none;
  }
  .om-scr-preview-avatar.empty { background: #EEF1F8; color: var(--muted2); }
  .om-scr-preview-avatar:first-child { margin-left: 0; }
  .om-scr-preview-infogrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
  .om-scr-preview-infogrid .cell { background: #F5F7FC; border-radius: 12px; padding: 10px 12px; }
  .om-scr-preview-infogrid .cell .k { font-size: 10px; color: var(--muted); font-weight: 700; }
  .om-scr-preview-infogrid .cell .v { font-size: 13px; color: var(--ink); font-weight: 800; margin-top: 2px; }
  .om-scr-preview-couponstrip {

      state.rooms.unshift(room);
      pushNotification({ icon: "bolt", iconColor: "#2F5EDB", title: room.title + " 개설됨 — 모집 시작", roomId: room.id, time: "방금" });
      emit();
      return room.id;
    },

    advanceTick: function (steps) {
      steps = steps || 1;
      for (var s = 0; s < steps; s++) {
        state.tick++;
        for (var i = 0; i < state.rooms.length; i++) {
          var room = state.rooms[i];
          if (room.status === "recruiting") {
            var remaining = [];
            for (var j = 0; j < room.scheduledJoins.length; j++) {
              var sj = room.scheduledJoins[j];
              if (sj.joinTick <= state.tick && room.participants.length < room.capacity) {
                var col = null;
                for (var k = 0; k < COLLEAGUES.length; k++) if (COLLEAGUES[k].id === sj.colleagueId) col = COLLEAGUES[k];
                if (col) room.participants.push({ id: col.id, name: col.name, deposited: true, checkedIn: false, noshow: false });
              } else {
                remaining.push(sj);
              }
            }
            room.scheduledJoins = remaining;
            if (room.participants.length >= room.capacity) {
              room.status = "confirmed";
              pushNotification({ icon: "check", iconColor: "#22A06B", title: room.title + " 확정 — " + room.capacity + "/" + room.capacity + "명", roomId: room.id, time: "방금" });
            } else if (state.tick >= room.deadlineTick) {
              room.status = "exploded";
              for (var p = 0; p < room.participants.length; p++) {
                if (room.participants[p].deposited) {
                  var refundAmt = room.participants[p].depositAmount || 500;
                  pushLedger({ type: "refund", amount: refundAmt, note: room.title + " 방폭 · 전액 환급", roomId: room.id });
                  if (room.participants[p].id === "me") state.user.points += refundAmt;
                  room.participants[p].deposited = false;
                }
              }
              pushNotification({ icon: "warn", iconColor: "#E05A5A", title: room.title + " 방폭 — 전액 환급됨", roomId: room.id, time: "방금" });
            }
          }
          if (room.status === "confirmed" && !room.reminderSent && state.tick >= room.slotTick - 1) {
            room.reminderSent = true;
            pushNotification({ icon: "clock", iconColor: "#F0A64E", title: room.title + " · 1시간 전 리마인더", roomId: room.id, time: "방금" });
          }
        }
      }
      emit();
    },

    play: function (speed) {
      sim.pause();
      state.simSpeed = speed || state.simSpeed || 1;
      autoplayHandle = setInterval(function () { sim.advanceTick(1); }, Math.max(200, 1200 / state.simSpeed));
      emit();
    },
    pause: function () { if (autoplayHandle) { clearInterval(autoplayHandle); autoplayHandle = null; } emit(); },
    setSpeed: function (speed) { state.simSpeed = speed; if (autoplayHandle) sim.play(speed); else emit(); },
    isPlaying: function () { return !!autoplayHandle; },

    joinRoom: function (roomId) {
      var room = findRoom(roomId);
      if (!room || room.status !== "recruiting") return { ok: false, reason: "not-open" };
      if (findParticipant(room, "me")) return { ok: false, reason: "already-joined" };
      if (room.participants.length >= room.capacity) return { ok: false, reason: "full" };
      room.participants.push({ id: "me", name: "나", deposited: false, checkedIn: false, noshow: false });
      if (room.participants.length >= room.capacity) {
        room.status = "confirmed";
        pushNotification({ icon: "check", iconColor: "#22A06B", title: room.title + " 확정됨", roomId: room.id, time: "방금" });
      }
      emit();
      return { ok: true };
    },

    payDeposit: function (roomId, amount) {
      amount = amount || 500;
      var room = findRoom(roomId);
      if (!room) return { ok: false, reason: "no-room" };
      var me = findParticipant(room, "me");
      if (!me) return { ok: false, reason: "not-joined" };
      if (state.user.points < amount) return { ok: false, reason: "insufficient" };
      state.user.points -= amount;
      me.deposited = true;
      me.depositAmount = amount;
      pushLedger({ type: "deposit", amount: -amount, note: room.title + " 디파짓 예치", roomId: room.id });
      emit();
      return { ok: true };
    },

    cancelDeposit: function (roomId) {
      var room = findRoom(roomId);
      if (!room) return { ok: false, reason: "no-room" };
      var me = findParticipant(room, "me");
      if (!me || !me.deposited) return { ok: false, reason: "no-deposit" };
      var penalty = (state.tick >= room.slotTick - 2);
      var paidAmount = me.depositAmount || 500;
      var refund = penalty ? Math.round(paidAmount / 2) : paidAmount;
      state.user.points += refund;
      me.deposited = false;
      room.participants = room.participants.filter(function (p) { return p.id !== "me"; });
      pushLedger({ type: "refund", amount: refund, note: room.title + " 취소" + (penalty ? " · 페널티 적용" : " · 무페널티"), roomId: room.id });
      emit();
      return { ok: true, penalty: penalty };
    },

    checkin: function (roomId, participantId) {
      var room = findRoom(roomId);
      if (!room) return { ok: false };
      var p = findParticipant(room, participantId);
      if (!p) return { ok: false };
      p.checkedIn = true;
      emit();
      return { ok: true };
    },

    confirmCheckin: function (roomId) {
      var room = findRoom(roomId);
      if (!room) return { ok: false };
      room.status = "checkin-done";
      for (var i = 0; i < room.participants.length; i++) {
        var p = room.participants[i];
        if (p.checkedIn) {
          pushLedger({ type: "bonus", amount: 50, note: room.title + " 체크인 환급", roomId: room.id });
          if (p.id === "me") state.user.points += 50;
        } else {
          p.noshow = true;
          state.user.noshowCount += (p.id === "me") ? 1 : 0;
          forfeitDeposit(room, p);
        }
      }
      pushNotification({ icon: "check", iconColor: "#22A06B", title: room.title + " 체크인 완료 · +50P 환급", roomId: room.id, time: "방금" });
      emit();
      return { ok: true };
    },

    markNoshow: function (roomId, participantId) {
      var room = findRoom(roomId);
      if (!room) return { ok: false };
      var p = findParticipant(room, participantId);
      if (!p) return { ok: false };
      p.noshow = true;
      if (p.id === "me") state.user.noshowCount++;
      forfeitDeposit(room, p);
      emit();
      return { ok: true };
    },

    settleRoom: function (roomId, opts) {
      var room = findRoom(roomId);
      if (!room) return { ok: false };
      var payers = room.participants.filter(function (p) { return !p.noshow; });
      var per = payers.length ? Math.round((opts.totalAmount || 0) / payers.length) : 0;
      room.status = "settled";
      room.receipt = { totalAmount: opts.totalAmount || 0, method: opts.method || "간편결제", perPerson: per, issuedTick: state.tick };
      pushLedger({ type: "settle", amount: -per, note: room.title + " 정산 · " + (opts.method || "간편결제"), roomId: room.id });
      emit();
      return { ok: true, perPerson: per };
    },

    applyCoupon: function (roomId) {
      var room = findRoom(roomId);
      if (!room) return { ok: false };
      room.couponApplied = true;
      emit();
      return { ok: true };
    },

    registerSponsor: function (spec) {
      state._roomSeq++;
      var seed = {
        id: "r" + state._roomSeq, title: spec.title || "스폰서드 모임", slotLabel: spec.slotLabel || "미정",
        tags: spec.tags || [], capacity: spec.capacity || 3, online: "offline",
        tick: state.tick, deadlineTick: state.tick + 8, createdTick: state.tick, sponsored: true
      };
      var room = buildRoom(seed);
      room.sponsorBudget = spec.budget || 0;
      room.couponPercent = spec.couponPercent || 15;
      state.rooms.unshift(room);
      emit();
      return room.id;
    },

    markNotificationRead: function (id) {
      for (var i = 0; i < state.notifications.length; i++) if (state.notifications[i].id === id) state.notifications[i].read = true;
      emit();
    },
    markAllNotificationsRead: function () {
      for (var i = 0; i < state.notifications.length; i++) state.notifications[i].read = true;
      emit();
    },
    updateSettings: function (patch) { Object.assign(state.settings, patch); emit(); },
    updateProfile: function (patch) { Object.assign(state.user, patch); emit(); },
    topUpPoints: function (amount) { state.user.points += amount; pushLedger({ type: "topup", amount: amount, note: "포인트 충전", roomId: null }); emit(); }
  };

  /* ---------------------------------------------------------------
   * Router — history API (push/replace) + popstate, with a slide
   * transition and a simple forward/back stack.
   * --------------------------------------------------------------- */
  var screens = {}; // id -> { title, render, onEnter, onLeave }
  var mounted = null; // { id, params, el, unsub }
  var histIdx = 0;
  var TAB_ROUTES = ["home", "explore", "my"];

  function register(id, def) {
    screens[id] = {
      title: def.title || id,
      render: def.render || function (el) { el.innerHTML = ""; },
      onEnter: def.onEnter || function () {},
      onLeave: def.onLeave || function () {}
    };
    // If this route is the one currently on screen as a placeholder,
    // re-render it immediately so late-loaded modules take effect.
    if (mounted && mounted.id === id) mountScreen(id, mounted.params, "none");
  }

  function encodeParams(params) {
    if (!params || !Object.keys(params).length) return "";
    return "?p=" + encodeURIComponent(JSON.stringify(params));
  }
  function parseHash(hash) {
    hash = (hash || "").replace(/^#\/?/, "");
    var qIdx = hash.indexOf("?");
    var id = qIdx === -1 ? hash : hash.slice(0, qIdx);
    var params = {};
    if (qIdx !== -1) {
      var qs = hash.slice(qIdx + 1);
      var m = qs.split("&");
      for (var i = 0; i < m.length; i++) {
        var kv = m[i].split("=");
        if (kv[0] === "p" && kv[1]) { try { params = JSON.parse(decodeURIComponent(kv[1])); } catch (e) { params = {}; } }
      }
    }
    return { id: id || "splash", params: params };
  }

  function placeholderDef(id) {
    return {
      title: id,
      render: function (el, params) {
        el.innerHTML = statusBar() + appBar("모듈 대기", id, id !== "home") +
          '<div class="om-body"><div class="om-placeholder">' +
          icon("gear", 30, "#8892AE") +
          '<div style="font-weight:800; font-size:13px; margin-top:10px; color:#0E1430;">"' + id + '" 모듈 대기</div>' +
          '<div style="font-size:11.5px; margin-top:4px;">이 라우트는 아직 등록되지 않았습니다.<br>OM.register("' + id + '", {...}) 로 붙여넣으세요.</div>' +
          (Object.keys(params || {}).length ? '<div class="tag">params: ' + JSON.stringify(params) + '</div>' : "") +
          '</div></div>';
      }
    };
  }

  function ensureScreen(id) {
    if (!screens[id]) screens[id] = placeholderDefAsScreen(id);
    return screens[id];
  }
  function placeholderDefAsScreen(id) {
    var d = placeholderDef(id);
    return { title: d.title, render: d.render, onEnter: function () {}, onLeave: function () {} };
  }

  function renderTabbar(activeId) {
    var bar = document.getElementById("omTabbar");
    if (TAB_ROUTES.indexOf(activeId) === -1) { bar.style.display = "none"; return; }
    bar.style.display = "flex";
    var unread = 0;
    for (var i = 0; i < state.notifications.length; i++) if (!state.notifications[i].read) unread++;
    var defs = [
      ["home", "chat", "홈"],
      ["explore", "compass", "탐색"],
      ["my", "person", "마이"]
    ];
    var html = "";
    for (var j = 0; j < defs.length; j++) {
      var d = defs[j];
      var active = d[0] === activeId;
      html += '<button class="om-tab' + (active ? " active" : "") + '" data-om-tab="' + d[0] + '">' +
        icon(d[1], 17, active ? "#2F5EDB" : "#8892AE") + '<span>' + d[2] + '</span>';
      if (d[0] === "my" && unread > 0) html += '<span class="badge-dot">' + (unread > 9 ? "9+" : unread) + '</span>';
      html += '</button>';
    }
    bar.innerHTML = html;
  }

  function mountScreen(id, params, direction) {
    // direction: "fwd" | "back" | "none"
    var stack = document.getElementById("omScreenStack");
    var def = ensureScreen(id);
    var el = document.createElement("div");
    el.className = "om-screen";
    if (direction === "fwd") el.classList.add("slide-in-fwd");
    if (direction === "back") el.classList.add("slide-in-back");
    stack.appendChild(el);
    def.render(el, params || {});
    var unsub = subscribe(function () { def.render(el, params || {}); });
    def.onEnter(params || {});

    var prev = mounted;
    mounted = { id: id, params: params || {}, el: el, unsub: unsub, def: def };
    renderTabbar(id);

    if (direction === "none" || !prev) {
      if (prev) { prev.unsub(); prev.def.onLeave(); prev.el.remove(); }
      requestAnimationFrame(function () { el.classList.remove("slide-in-fwd", "slide-in-back"); });
      return;
    }
    requestAnimationFrame(function () {
      el.classList.add("slide-settle");
      el.classList.remove("slide-in-fwd", "slide-in-back");
      prev.el.classList.add(direction === "fwd" ? "slide-out-fwd" : "slide-out-back");
    });
    setTimeout(function () {
      prev.unsub();
      prev.def.onLeave();
      prev.el.remove();
    }, 300);
  }

  function go(route, params, opts) {
    opts = opts || {};
    histIdx++;
    var hash = "#/" + route + encodeParams(params);
    if (opts.replace) history.replaceState({ idx: histIdx }, "", hash);
    else history.pushState({ idx: histIdx }, "", hash);
    mountScreen(route, params, "fwd");
  }
  function back() {
    if (history.state && history.state.idx > 0) history.back();
    else go("home", {}, { replace: true });
  }

  window.addEventListener("popstate", function (e) {
    var parsed = parseHash(location.hash);
    var newIdx = (e.state && typeof e.state.idx === "number") ? e.state.idx : 0;
    var direction = newIdx < histIdx ? "back" : "fwd";
    histIdx = newIdx;
    mountScreen(parsed.id, parsed.params, direction);
  });

  document.addEventListener("click", function (e) {
    var backBtn = e.target.closest ? e.target.closest("[data-om-back]") : null;
    if (backBtn) { back(); return; }
    var tabBtn = e.target.closest ? e.target.closest("[data-om-tab]") : null;
    if (tabBtn) { go(tabBtn.getAttribute("data-om-tab"), {}); return; }
  });

  /* ---------------------------------------------------------------
   * Public API
   * --------------------------------------------------------------- */
  window.OM = {
    state: state,
    subscribe: subscribe,
    emit: emit,
    sim: sim,
    register: register,
    go: go,
    back: back,
    ui: { icon: icon, chip: chip, statusBar: statusBar, appBar: appBar, qrGrid: qrGrid, stepperDots: stepperDots, gauge: gauge },
    _colleagues: COLLEAGUES
  };

  /* ---------------------------------------------------------------
   * Placeholder registration for every contract route, so shell.html
   * runs standalone. Real modules call OM.register(id, {...}) again
   * later (appended as separate <script> blocks) and silently win.
   * --------------------------------------------------------------- */
  var ALL_ROUTES = [
    // A onboarding
    "splash", "onboard-consent", "onboard-profile", "settings", "profile-edit",
    // B home-chat
    "home", "room-chat",
    // C lifecycle
    "room-detail", "deposit", "reminder", "checkin", "settle", "noshow",
    // D explore
    "explore", "room-preview", "sponsor-offer", "sponsor-register",
    // E my
    "my", "ledger", "notifications"
  ];
  ALL_ROUTES.forEach(function (id) {
    if (id === "splash") return; // splash gets a real screen below
    screens[id] = placeholderDefAsScreen(id);
  });

  register("splash", {
    title: "splash",
    render: function (el) {
      el.innerHTML = '<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:linear-gradient(160deg,#1a2440,#0b1022);">' +
        '<span style="width:56px; height:56px; border-radius:18px; background:linear-gradient(150deg,#4C7DF5,#2F5EDB); display:flex; align-items:center; justify-content:center; box-shadow:0 16px 30px -10px rgba(47,94,219,.6);">' + icon("bolt", 28, "#fff") + '</span>' +
        '<div style="color:#fff; font-weight:800; font-size:16px; letter-spacing:-.01em;">OfficeMate</div>' +
        '<div style="color:#9AA3BE; font-size:11.5px;">동료와 번개 모임, 말 한마디로.</div>' +
        '<button class="om-btn om-press" style="width:auto; padding:10px 22px; margin-top:8px;" data-om-start="1">시작하기</button>' +
        '</div>';
    },
    onEnter: function () {
      document.addEventListener("click", startOnce);
      function startOnce(e) {
        if (e.target.closest && e.target.closest("[data-om-start]")) {
          document.removeEventListener("click", startOnce);
          go("onboard-consent", {}, { replace: true });
        }
      }
    }
  });

  /* ---------------------------------------------------------------
   * Demo speed control bar (tick advance + play/pause) — small
   * always-available affordance so the sim engine is reachable
   * without a purpose-built screen.
   * --------------------------------------------------------------- */
  function renderSimBar() {
    var bar = document.getElementById("omSimBar");
    bar.innerHTML = "tick " + state.tick +
      ' <button data-om-sim="step">+1</button>' +
      ' <button data-om-sim="play">' + (sim.isPlaying() ? "정지" : "재생") + '</button>' +
      ' <button data-om-sim="speed">x' + state.simSpeed + '</button>';
  }
  document.getElementById("omSimBar").addEventListener("click", function (e) {
    var btn = e.target.closest ? e.target.closest("[data-om-sim]") : null;
    if (!btn) return;
    var action = btn.getAttribute("data-om-sim");
    if (action === "step") sim.advanceTick(1);
    else if (action === "play") { sim.isPlaying() ? sim.pause() : sim.play(state.simSpeed); }
    else if (action === "speed") sim.setSpeed(state.simSpeed >= 4 ? 1 : state.simSpeed * 2);
  });
  var simBarTimer = null;
  document.getElementById("omStage").addEventListener("mousemove", showSimBar);
  document.getElementById("omStage").addEventListener("touchstart", showSimBar);
  function showSimBar() {
    var bar = document.getElementById("omSimBar");
    if (!bar.classList.contains("show")) {
      bar.classList.add("show");
      renderSimBar();
    }
    clearTimeout(simBarTimer);
    simBarTimer = setTimeout(function () { bar.classList.remove("show"); }, 2500);
  }
  subscribe(renderSimBar);

  /* ---------------------------------------------------------------
   * Boot
   * --------------------------------------------------------------- */
  function boot() {
    var parsed = parseHash(location.hash);
    if (!location.hash) {
      history.replaceState({ idx: 0 }, "", "#/splash");
      mountScreen("splash", {}, "none");
    } else {
      history.replaceState({ idx: 0 }, "", location.hash);
      mountScreen(parsed.id, parsed.params, "none");
    }
  }
  boot();
})();
</script>
<script>
(function () {
  "use strict";

  var TAG_CATALOG = ["매운맛", "베이커리", "커피챗", "보드게임", "러닝", "채식"];

  function toast(el, msg) {
    var old = el.querySelector(".om-toast");
    if (old) old.remove();
    var t = document.createElement("div");
    t.className = "om-toast";
    t.textContent = msg;
    el.appendChild(t);
    setTimeout(function () { if (t.parentNode) t.remove(); }, 1600);
  }

  function tagChipsHtml(selected, prefix) {
    var html = '<div class="om-scr-onb-chiprow">';
    for (var i = 0; i < TAG_CATALOG.length; i++) {
      var t = TAG_CATALOG[i];
      var on = selected.indexOf(t) !== -1;
      html += '<span class="om-scr-onb-tagchip' + (on ? " on" : "") + '" data-' + prefix + '-tag="' + t + '">' + t + '</span>';
    }
    return html + "</div>";
  }

  /* ================================================================
   * onboard-consent
   * ================================================================ */
  (function () {
    var consent = { tos: false, privacy: false, location: false, marketing: false };
    var loading = true;
    var lastEl = null;
    var loadTimer = null;

    var ITEMS = [
      { key: "tos", label: "서비스 이용약관 동의", req: true, detail: "OfficeMate 서비스 전반의 이용 조건에 대한 약관입니다." },
      { key: "privacy", label: "개인정보 수집·이용 동의", req: true, detail: "이름·부서·모임 이력 등 매칭·정산에 필요한 정보를 수집합니다." },
      { key: "location", label: "위치기반서비스 이용약관 동의", req: true, detail: "오프라인 모임 추천을 위해 근무지 기반 위치 정보를 활용합니다." },
      { key: "marketing", label: "마케팅 정보 수신 동의", req: false, detail: "이벤트·스폰서 혜택 알림을 받아보실 수 있어요. 언제든 해제 가능합니다." }
    ];

    function allRequiredOn() {
      for (var i = 0; i < ITEMS.length; i++) if (ITEMS[i].req && !consent[ITEMS[i].key]) return false;
      return true;
    }
    function allOn() {
      for (var i = 0; i < ITEMS.length; i++) if (!consent[ITEMS[i].key]) return false;
      return true;
    }

    function render(el, params) {
      lastEl = el;
      var body = '<div class="om-card">' +
        '<div style="font-weight:800; font-size:13.5px;">동의하고 시작할게요</div>' +
        '<div class="om-scr-onb-detail">아래 약관에 동의하시면 OfficeMate의 매칭·정산 기능을 바로 쓸 수 있어요.</div>' +
        '</div>';

      if (loading) {
        body += '<div class="om-card">' +
          '<div class="skel-line skel" style="width:70%;"></div>' +
          '<div class="skel-line skel" style="width:95%;"></div>' +
          '<div class="skel-line skel" style="width:95%;"></div>' +
          '<div class="skel-line skel" style="width:60%;"></div>' +
          '</div>';
      } else {
        body += '<div class="om-card">' +
          '<div class="om-scr-onb-item" data-onb-action="toggle-all">' +
          '<span class="om-scr-onb-box' + (allOn() ? " on" : "") + '">' + (allOn() ? OM.ui.icon("check", 12, "#fff") : "") + '</span>' +
          '<span class="om-scr-onb-label">전체 동의</span>' +
          '</div></div>';

        body += '<div class="om-card">';
        for (var i = 0; i < ITEMS.length; i++) {
          var it = ITEMS[i];
          var on = consent[it.key];
          body += '<div class="om-scr-onb-item" data-onb-toggle="' + it.key + '">' +
            '<span class="om-scr-onb-box' + (on ? " on" : "") + '">' + (on ? OM.ui.icon("check", 12, "#fff") : "") + '</span>' +
            '<div style="flex:1;">' +
            '<span class="om-scr-onb-label" style="display:inline;">' + it.label + '</span>' +
            '<span class="' + (it.req ? "om-scr-onb-tag-req" : "om-scr-onb-tag-opt") + '">' + (it.req ? "필수" : "선택") + '</span>' +
            '<div class="om-scr-onb-detail">' + it.detail + '</div>' +
            '</div></div>';
        }
        body += '</div>';
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("동의 및 시작", "1 / 2", true) +
        '<div class="om-body">' + body +
        '<button class="om-btn om-press" style="margin-top:6px;" data-onb-action="continue"' + (allRequiredOn() ? "" : " disabled") + '>다음</button>' +
        '</div>';
    }

    function handleClick(e) {
      var toggle = e.target.closest ? e.target.closest("[data-onb-toggle]") : null;
      var action = e.target.closest ? e.target.closest("[data-onb-action]") : null;
      if (toggle) {
        var key = toggle.getAttribute("data-onb-toggle");
        consent[key] = !consent[key];
        render(lastEl, {});
        return;
      }
      if (action) {
        var a = action.getAttribute("data-onb-action");
        if (a === "toggle-all") {
          var next = !allOn();
          for (var i = 0; i < ITEMS.length; i++) consent[ITEMS[i].key] = next;
          render(lastEl, {});
        } else if (a === "continue") {
          if (!allRequiredOn()) { toast(lastEl, "필수 항목에 모두 동의해주세요"); return; }
          OM.go("onboard-profile", {});
        }
      }
    }

    OM.register("onboard-consent", {
      title: "동의 및 시작",
      render: render,
      onEnter: function () {
        lastEl.addEventListener("click", handleClick);
        loadTimer = setTimeout(function () { loading = false; render(lastEl, {}); }, 380);
      },
      onLeave: function () {
        if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
      }
    });
  })();

  /* ================================================================
   * onboard-profile
   * ================================================================ */
  (function () {
    var profile = { tags: [], mealPref: "일반", workStyle: "상관없음", bio: "" };
    var loading = true;
    var lastEl = null;
    var loadTimer = null;

    function render(el, params) {
      lastEl = el;
      var body;
      if (loading) {
        body = '<div class="om-card">' +
          '<div class="skel-line skel" style="width:50%;"></div>' +
          '<div class="skel-line skel" style="width:100%;"></div>' +
          '<div class="skel-line skel" style="width:80%;"></div>' +
          '</div>';
      } else {
        body = '<div class="om-card">' +
          '<div class="om-scr-onb-label-sm">관심 태그 (1개 이상)</div>' +
          tagChipsHtml(profile.tags, "onbp") +
          (profile.tags.length === 0 ? '<div class="om-scr-ped-empty">아직 선택한 관심사가 없어요. 태그를 눌러 골라보세요.</div>' : "") +

          '<div class="om-scr-onb-label-sm">식사 취향</div>' +
          '<div class="om-scr-onb-seg">' +
          '<span class="om-scr-onb-segbtn' + (profile.mealPref === "일반" ? " on" : "") + '" data-onbp-meal="일반">일반식</span>' +
          '<span class="om-scr-onb-segbtn' + (profile.mealPref === "채식" ? " on" : "") + '" data-onbp-meal="채식">채식</span>' +
          '</div>' +

          '<div class="om-scr-onb-label-sm">근무 형태</div>' +
          '<div class="om-scr-onb-seg">' +
          '<span class="om-scr-onb-segbtn' + (profile.workStyle === "오프라인 선호" ? " on" : "") + '" data-onbp-work="오프라인 선호">오프라인</span>' +
          '<span class="om-scr-onb-segbtn' + (profile.workStyle === "온라인 선호" ? " on" : "") + '" data-onbp-work="온라인 선호">온라인</span>' +
          '<span class="om-scr-onb-segbtn' + (profile.workStyle === "상관없음" ? " on" : "") + '" data-onbp-work="상관없음">상관없음</span>' +
          '</div>' +

          '<div class="om-scr-onb-label-sm">한줄 소개</div>' +
          '<textarea class="om-scr-onb-bio" rows="2" maxlength="60" placeholder="동료들에게 나를 짧게 소개해보세요" id="omOnbpBio">' + profile.bio + '</textarea>' +
          '</div>';
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("관심사 설정", "2 / 2", true) +
        '<div class="om-body">' + body +
        '<button class="om-btn om-press" style="margin-top:6px;" data-onbp-action="finish"' + (loading ? " disabled" : "") + '>완료하고 시작하기</button>' +
        '</div>';

      if (!loading) {
        var ta = el.querySelector("#omOnbpBio");
        if (ta) ta.addEventListener("input", function (e) { profile.bio = e.target.value; });
      }
    }

    function handleClick(e) {
      var tagEl = e.target.closest ? e.target.closest("[data-onbp-tag]") : null;
      var mealEl = e.target.closest ? e.target.closest("[data-onbp-meal]") : null;
      var workEl = e.target.closest ? e.target.closest("[data-onbp-work]") : null;
      var actionEl = e.target.closest ? e.target.closest("[data-onbp-action]") : null;

      if (tagEl) {
        var t = tagEl.getAttribute("data-onbp-tag");
        var idx = profile.tags.indexOf(t);
        if (idx === -1) profile.tags.push(t); else profile.tags.splice(idx, 1);
        render(lastEl, {});
        return;
      }
      if (mealEl) { profile.mealPref = mealEl.getAttribute("data-onbp-meal"); render(lastEl, {}); return; }
      if (workEl) { profile.workStyle = workEl.getAttribute("data-onbp-work"); render(lastEl, {}); return; }
      if (actionEl && actionEl.getAttribute("data-onbp-action") === "finish") {
        if (profile.tags.length === 0) { toast(lastEl, "관심 태그를 1개 이상 선택해주세요"); return; }
        OM.sim.updateSettings({ vegOnly: profile.mealPref === "채식" });
        toast(lastEl, "온보딩 완료! 홈으로 이동합니다");
        setTimeout(function () { OM.go("home", {}, { replace: true }); }, 500);
      }
    }

    OM.register("onboard-profile", {
      title: "관심사 설정",
      render: render,
      onEnter: function () {
        lastEl.addEventListener("click", handleClick);
        loadTimer = setTimeout(function () { loading = false; render(lastEl, {}); }, 380);
      },
      onLeave: function () {
        if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
      }
    });
  })();

  /* ================================================================
   * settings
   * ================================================================ */
  (function () {
    var lastEl = null;
    var showSpeed = false;

    function switchHtml(on, action) {
      return '<button class="om-scr-set-switch' + (on ? " on" : "") + '" data-set-action="' + action + '"><i></i></button>';
    }

    function render(el, params) {
      lastEl = el;
      var s = OM.state.settings;
      var body = '<div class="om-card">' +
        '<div class="om-scr-onb-label-sm" style="margin-top:0;">알림 시간대</div>' +
        '<div class="om-scr-set-row"><div><div class="om-scr-set-row-txt">아침 알림</div><div class="om-scr-set-row-sub">오전 슬롯 제안을 받아요</div></div>' + switchHtml(s.notifyMorning, "notifyMorning") + '</div>' +
        '<div class="om-scr-set-row"><div><div class="om-scr-set-row-txt">점심 알림</div><div class="om-scr-set-row-sub">점심 슬롯 제안을 받아요</div></div>' + switchHtml(s.notifyLunch, "notifyLunch") + '</div>' +
        '<div class="om-scr-set-row"><div><div class="om-scr-set-row-txt">저녁 알림</div><div class="om-scr-set-row-sub">저녁 슬롯 제안을 받아요</div></div>' + switchHtml(s.notifyEvening, "notifyEvening") + '</div>' +
        '</div>' +

        '<div class="om-card">' +
        '<div class="om-scr-onb-label-sm" style="margin-top:0;">매칭 선호</div>' +
        '<div class="om-scr-set-row"><div><div class="om-scr-set-row-txt">다양한 부서와 매칭</div><div class="om-scr-set-row-sub">같은 부서보다 여러 부서와 우선 매칭돼요</div></div>' + switchHtml(s.preferDiversity, "preferDiversity") + '</div>' +
        '<div class="om-scr-set-row"><div><div class="om-scr-set-row-txt">채식 메뉴만 추천</div><div class="om-scr-set-row-sub">모집 시 채식 태그 모임을 우선 보여줘요</div></div>' + switchHtml(s.vegOnly, "vegOnly") + '</div>' +
        '<div class="om-scr-set-navrow" data-set-action="edit-profile"><div><div class="om-scr-set-row-txt">프로필 정보 수정</div><div class="om-scr-set-row-sub">이름 · 부서 · 관심 태그</div></div>' + OM.ui.icon("back", 13, "#8892AE") + '</div>' +
        '</div>' +

        '<div class="om-card">' +
        '<div class="om-scr-set-row"><div><div class="om-scr-set-row-txt">배속 컨트롤 노출</div><div class="om-scr-set-row-sub">데모 시연용 시간 배속 컨트롤을 화면에 표시해요</div></div>' + switchHtml(showSpeed, "toggleSpeed") + '</div>' +
        (showSpeed ?
          '<div class="om-scr-set-simbox">' +
          '<span class="om-chip blue">tick ' + OM.state.tick + '</span>' +
          '<button class="om-btn auto secondary om-press" data-set-action="sim-step">+1틱</button>' +
          '<button class="om-btn auto secondary om-press" data-set-action="sim-play">' + (OM.sim.isPlaying() ? "정지" : "재생") + '</button>' +
          '<button class="om-btn auto secondary om-press" data-set-action="sim-speed">x' + OM.state.simSpeed + '</button>' +
          '</div>' : "") +
        '</div>';

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("설정", "알림 · 매칭 · 배속", true) +
        '<div class="om-body">' + body + '</div>';
    }

    var TOGGLE_FIELDS = { notifyMorning: 1, notifyLunch: 1, notifyEvening: 1, preferDiversity: 1, vegOnly: 1 };

    function handleClick(e) {
      var btn = e.target.closest ? e.target.closest("[data-set-action]") : null;
      if (!btn) return;
      var action = btn.getAttribute("data-set-action");
      if (TOGGLE_FIELDS[action]) {
        var patch = {};
        patch[action] = !OM.state.settings[action];
        OM.sim.updateSettings(patch);
        toast(lastEl, "설정이 저장되었어요");
        return;
      }
      if (action === "toggleSpeed") { showSpeed = !showSpeed; render(lastEl, {}); return; }
      if (action === "sim-step") { OM.sim.advanceTick(1); return; }
      if (action === "sim-play") { OM.sim.isPlaying() ? OM.sim.pause() : OM.sim.play(OM.state.simSpeed); return; }
      if (action === "sim-speed") { OM.sim.setSpeed(OM.state.simSpeed >= 4 ? 1 : OM.state.simSpeed * 2); return; }
      if (action === "edit-profile") { OM.go("profile-edit", {}); return; }
    }

    OM.register("settings", {
      title: "설정",
      render: render,
      onEnter: function () { lastEl.addEventListener("click", handleClick); },
      onLeave: function () {}
    });
  })();

  /* ================================================================
   * profile-edit
   * ================================================================ */
  (function () {
    var buf = null; // { name, dept, deptVisible, tags }
    var lastEl = null;
    var loading = true;
    var loadTimer = null;
    var nameErr = false;

    function ensureBuf() {
      if (!buf) {
        buf = { name: OM.state.user.name, dept: OM.state.user.dept, deptVisible: true, tags: [] };
      }
    }

    function render(el, params) {
      lastEl = el;
      ensureBuf();
      var body;
      if (loading) {
        body = '<div class="om-card">' +
          '<div class="skel-line skel" style="width:40%;"></div>' +
          '<div class="skel-line skel" style="width:90%;"></div>' +
          '<div class="skel-line skel" style="width:90%;"></div>' +
          '</div>';
      } else {
        body = '<div class="om-card">' +
          '<div class="om-scr-ped-field">' +
          '<label>이름</label>' +
          '<input class="om-scr-ped-input' + (nameErr ? " err" : "") + '" id="omPedName" value="' + buf.name + '" placeholder="이름을 입력하세요">' +
          (nameErr ? '<div class="om-scr-ped-errtxt">이름은 비워둘 수 없어요</div>' : "") +
          '</div>' +
          '<div class="om-scr-ped-field">' +
          '<label>부서</label>' +
          '<input class="om-scr-ped-input" id="omPedDept" value="' + buf.dept + '" placeholder="부서를 입력하세요">' +
          '</div>' +
          '<div class="om-scr-set-row" style="margin-top:8px;">' +
          '<div><div class="om-scr-set-row-txt">부서 공개</div><div class="om-scr-set-row-sub">다른 동료에게 내 부서를 보여줘요</div></div>' +
          '<button class="om-scr-set-switch' + (buf.deptVisible ? " on" : "") + '" data-ped-action="toggle-visible"><i></i></button>' +
          '</div>' +
          '</div>' +

          '<div class="om-card">' +
          '<div class="om-scr-onb-label-sm" style="margin-top:0;">관심 태그</div>' +
          tagChipsHtml(buf.tags, "ped") +
          (buf.tags.length === 0 ? '<div class="om-scr-ped-empty">관심 태그를 선택하면 매칭 정확도가 올라가요.</div>' : "") +
          '</div>';
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("프로필 편집", "", true) +
        '<div class="om-body">' + body +
        (loading ? "" :
          '<div style="display:flex; gap:8px; margin-top:6px;">' +
          '<button class="om-btn ghost om-press" data-ped-action="cancel">취소</button>' +
          '<button class="om-btn om-press" data-ped-action="save">저장</button>' +
          '</div>') +
        '</div>';

      if (!loading) {
        var ni = el.querySelector("#omPedName");
        var di = el.querySelector("#omPedDept");
        if (ni) ni.addEventListener("input", function (e) { buf.name = e.target.value; if (nameErr && e.target.value.trim()) { nameErr = false; render(lastEl, {}); } });
        if (di) di.addEventListener("input", function (e) { buf.dept = e.target.value; });
      }
    }

    function handleClick(e) {
      var tagEl = e.target.closest ? e.target.closest("[data-ped-tag]") : null;
      var actionEl = e.target.closest ? e.target.closest("[data-ped-action]") : null;

      if (tagEl) {
        var t = tagEl.getAttribute("data-ped-tag");
        var idx = buf.tags.indexOf(t);
        if (idx === -1) buf.tags.push(t); else buf.tags.splice(idx, 1);
        render(lastEl, {});
        return;
      }
      if (actionEl) {
        var a = actionEl.getAttribute("data-ped-action");
        if (a === "toggle-visible") { buf.deptVisible = !buf.deptVisible; render(lastEl, {}); return; }
        if (a === "cancel") { buf = null; nameErr = false; OM.back(); return; }
        if (a === "save") {
          if (!buf.name || !buf.name.trim()) { nameErr = true; render(lastEl, {}); toast(lastEl, "이름을 입력해주세요"); return; }
          OM.sim.updateProfile({ name: buf.name.trim(), dept: buf.dept.trim() || OM.state.user.dept });
          toast(lastEl, "저장되었습니다");
          buf = null; nameErr = false;
          setTimeout(function () { OM.back(); }, 450);
        }
      }
    }

    OM.register("profile-edit", {
      title: "프로필 편집",
      render: render,
      onEnter: function () {
        lastEl.addEventListener("click", handleClick);
        loading = true;
        loadTimer = setTimeout(function () { loading = false; render(lastEl, {}); }, 300);
      },
      onLeave: function () {
        if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
        buf = null; nameErr = false; loading = true;
      }
    });
  })();

})();
</script>
<script>
(function () {
  "use strict";

  /* =================================================================
   * Shared helpers
   * ================================================================= */
  function esc(s) {
    s = String(s == null ? "" : s);
    s = s.split("&").join("&amp;");
    s = s.split("<").join("&lt;");
    s = s.split(">").join("&gt;");
    s = s.split('"').join("&quot;");
    return s;
  }
  function omFindRoom(roomId) {
    var rooms = OM.state.rooms;
    for (var i = 0; i < rooms.length; i++) if (rooms[i].id === roomId) return rooms[i];
    return null;
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  /* =================================================================
   * SECTION A — home: 봇 채팅 홈 (탭 루트)
   * ================================================================= */
  var SLOT_DAYS = ["월", "화", "수", "목", "금"];
  var SLOT_PERIODS = [
    { key: "morning", label: "아침", time: "08:00" },
    { key: "lunch", label: "점심", time: "12:00" },
    { key: "evening", label: "저녁", time: "19:00" }
  ];
  var HC_EXAMPLES = ["목요일 점심 매운 거 3명", "내일 저녁 커피챗 2명", "금요일 점심 보드게임 4명"];

  var homeChat = {
    messages: [],
    activePanel: null,
    draft: { dayLabel: null, periodLabel: null, slotLabel: null, tags: [], capacity: null, online: null },
    headcountVal: 3,
    slotTab: "lunch",
    roomId: null,
    knownParticipantIds: [],
    lastStatus: null,
    inputVal: "",
    toast: null,
    _toastTimer: null
  };
  var homeEl = null;
  var homeParams = null;

  /* ---- 자연어 파싱 (문자열 함수만 사용, 정규식 금지) ---- */
  function detectDay(text) {
    var days = [
      ["월요일", "월"], ["화요일", "화"], ["수요일", "수"], ["목요일", "목"], ["금요일", "금"], ["토요일", "토"], ["일요일", "일"],
      ["오늘", "오늘"], ["내일", "내일"], ["모레", "모레"]
    ];
    for (var i = 0; i < days.length; i++) if (text.indexOf(days[i][0]) !== -1) return days[i][1];
    return null;
  }
  function detectPeriod(text) {
    var periods = [
      ["아침", "아침", "08:00"], ["오전", "아침", "08:00"],
      ["점심", "점심", "12:00"], ["낮", "점심", "12:00"],
      ["저녁", "저녁", "19:00"], ["밤", "저녁", "19:00"]
    ];
    for (var i = 0; i < periods.length; i++) if (text.indexOf(periods[i][0]) !== -1) return { label: periods[i][1], time: periods[i][2] };
    return null;
  }
  function detectTags(text) {
    var dict = [
      ["매운맛", ["매운맛", "매운"]],
      ["커피챗", ["커피챗", "커피"]],
      ["채식", ["채식", "비건"]],
      ["베이커리", ["베이커리", "빵"]],
      ["보드게임", ["보드게임", "보드"]],
      ["러닝", ["러닝", "달리기", "조깅"]]
    ];
    var found = [];
    for (var i = 0; i < dict.length; i++) {
      var kws = dict[i][1];
      for (var j = 0; j < kws.length; j++) {
        if (text.indexOf(kws[j]) !== -1) { found.push(dict[i][0]); break; }
      }
    }
    return found;
  }
  function detectHeadcount(text) {
    for (var i = 0; i < text.length; i++) {
      var c = text.charAt(i);
      if (c >= "0" && c <= "9") {
        var j = i;
        while (j < text.length && text.charAt(j) >= "0" && text.charAt(j) <= "9") j++;
        var numStr = text.slice(i, j);
        var rest = text.charAt(j);
        if (rest === "명" || rest === "인") return parseInt(numStr, 10);
        i = j;
      }
    }
    var words = [["한명", 1], ["두명", 2], ["세명", 3], ["네명", 4], ["다섯명", 5], ["여섯명", 6]];
    for (var k = 0; k < words.length; k++) if (text.indexOf(words[k][0]) !== -1) return words[k][1];
    return null;
  }
  function parseSentence(text) {
    var day = detectDay(text);
    var period = detectPeriod(text);
    var tags = detectTags(text);
    var headcount = detectHeadcount(text);
    var missing = [];
    if (!day && !period) missing.push("시간");
    if (!headcount) missing.push("인원");
    if (missing.length) return { ok: false, missing: missing };
    var dayLabel = day || "오늘";
    var periodLabel = period ? period.label : "점심";
    var timeStr = period ? period.time : "12:00";
    var online = tags.indexOf("커피챗") !== -1 ? "online" : "offline";
    return {
      ok: true,
      draft: {
        dayLabel: dayLabel, periodLabel: periodLabel, slotLabel: dayLabel + " " + timeStr,
        tags: tags, capacity: headcount, online: online
      }
    };
  }
  function buildReaskText(missing) {
    var hasTime = missing.indexOf("시간") !== -1;
    var hasCount = missing.indexOf("인원") !== -1;
    if (hasTime && hasCount) return "언제, 몇 명인지 잘 못 읽었어요. 예: '목요일 점심 3명'처럼 알려주실래요?";
    if (hasCount) return "인원을 못 읽었어요. 몇 명인지 알려주실래요?";
    return "시간을 못 읽었어요. 언제인지 알려주실래요?";
  }

  /* ---- 렌더 ---- */
  function renderMessage(m) {
    if (m.kind === "me") return '<div class="om-bubble bot">' + esc(m.text) + "</div>";
    if (m.kind === "bot") return '<div class="om-bubble">' + OM.ui.icon("bolt", 12, "#2F5EDB") + " " + esc(m.text) + "</div>";
    if (m.kind === "roomcard") return renderHomeRoomCard(m.roomId);
    return "";
  }
  function renderExamples() {
    var greet = homeChat.messages.length
      ? "다른 모임도 말해보세요. 예를 들면 이렇게요."
      : "안녕하세요! 언제, 뭘 먹을지, 몇 명인지 편하게 말해주세요. 예를 들면 이렇게요.";
    var html = '<div class="om-bubble">' + OM.ui.icon("bolt", 12, "#2F5EDB") + " " + greet + "</div>";
    html += '<div class="om-hc-examples">';
    for (var i = 0; i < HC_EXAMPLES.length; i++) {
      html += '<button class="om-chip blue om-hc-chipbtn om-press" data-action="example" data-text="' + esc(HC_EXAMPLES[i]) + '">' + esc(HC_EXAMPLES[i]) + "</button>";
    }
    html += "</div>";
    return html;
  }
  function renderConfirmPanel() {
    var d = homeChat.draft;
    var tagsHtml = d.tags.length ? d.tags.map(function (t) { return OM.ui.chip("blue", t); }).join(" ") : OM.ui.chip("grey", "태그 없음");
    return '<div class="om-card">' +
      '<div style="font-size:11px; color:var(--muted); margin-bottom:4px;">파싱 결과 확인 · 수정 가능</div>' +
      '<div style="font-weight:800; font-size:14px; margin-bottom:6px;">' + esc(d.slotLabel) + "</div>" +
      '<div style="margin-bottom:10px;">' + tagsHtml + "</div>" +
      '<div style="font-size:11.5px; color:var(--muted); margin-bottom:12px;">정원 ' + d.capacity + "명</div>" +
      '<button class="om-btn om-press" data-action="confirm-create">이대로 개설하기</button>' +
      '<div style="display:flex; gap:8px; margin-top:8px;">' +
      '<button class="om-btn secondary om-press" style="flex:1;" data-action="edit-slot">슬롯 다시 고르기</button>' +
      '<button class="om-btn secondary om-press" style="flex:1;" data-action="edit-headcount">인원 조정</button>' +
      "</div></div>";
  }
  function renderReaskPanel() {
    return '<div class="om-card">' + OM.ui.chip("amber", "파싱 실패 → 재질문") +
      '<div style="font-size:11.5px; color:var(--muted); margin-top:8px;">직접 다시 입력하거나, 슬롯을 골라보세요.</div>' +
      '<button class="om-btn secondary om-press" style="margin-top:10px;" data-action="reask-slotpicker">슬롯 직접 고르기</button>' +
      "</div>";
  }
  function renderSlotpickerPanel() {
    var tabsHtml = "";
    for (var i = 0; i < SLOT_PERIODS.length; i++) {
      var active = homeChat.slotTab === SLOT_PERIODS[i].key;
      tabsHtml += '<button class="om-hc-slot-tab' + (active ? " active" : "") + ' om-press" data-action="slot-tab" data-tab="' + SLOT_PERIODS[i].key + '">' + SLOT_PERIODS[i].label + "</button>";
    }
    var current = null;
    for (var j = 0; j < SLOT_PERIODS.length; j++) if (SLOT_PERIODS[j].key === homeChat.slotTab) current = SLOT_PERIODS[j];
    var gridHtml = "";
    for (var k = 0; k < SLOT_DAYS.length; k++) {
      var day = SLOT_DAYS[k];
      var selected = homeChat.draft.dayLabel === day && homeChat.draft.periodLabel === current.label;
      gridHtml += '<button class="om-chip ' + (selected ? "blue" : "grey") + ' om-hc-slotchip om-press" data-action="pick-slot" data-day="' + day + '" data-time="' + current.time + '" data-period="' + current.label + '">' + day + " " + current.time + "</button>";
    }
    var summary = homeChat.draft.slotLabel ? ("선택됨: " + homeChat.draft.slotLabel) : "시간대 탭을 고르고 요일을 선택하세요";
    return '<div class="om-card">' +
      '<div style="font-size:11.5px; color:var(--muted); margin-bottom:8px;">' + esc(summary) + "</div>" +
      '<div class="om-hc-slot-tabs">' + tabsHtml + "</div>" +
      '<div class="om-hc-slotgrid">' + gridHtml + "</div>" +
      "</div>";
  }
  function renderHeadcountPanel() {
    return '<div class="om-card" style="text-align:center;">' +
      '<div style="font-size:11.5px; color:var(--muted); margin-bottom:10px;">인원을 선택하세요</div>' +
      '<div class="om-hc-stepper-row">' +
      '<button class="om-btn secondary auto om-press" data-action="hc-minus">-</button>' +
      '<div style="font-weight:800; font-size:20px; min-width:44px;">' + homeChat.headcountVal + "명</div>" +
      '<button class="om-btn secondary auto om-press" data-action="hc-plus">+</button>' +
      "</div>" +
      '<button class="om-btn om-press" style="margin-top:12px;" data-action="hc-next">다음</button>' +
      "</div>";
  }
  function renderOnoffPanel() {
    var d = homeChat.draft;
    var online = d.tags && d.tags.indexOf("커피챗") !== -1;
    d.online = online ? "online" : "offline";
    var minutes = online ? 30 : 60;
    var card = online
      ? '<div style="text-align:center;">' + OM.ui.chip("blue", "온라인") + '<div style="margin:10px 0;">' + OM.ui.icon("video", 28, "#2F5EDB") + '</div><div style="font-weight:800; font-size:13px;">화상 모임 링크가 자동 생성돼요</div></div>'
      : '<div style="text-align:center;">' + OM.ui.chip("green", "오프라인") + '<div style="margin:10px 0;">' + OM.ui.icon("building", 28, "#22A06B") + '</div><div style="font-weight:800; font-size:13px;">오프라인 모임으로 진행돼요</div></div>';
    return '<div class="om-card">' +
      '<div style="font-size:11px; color:var(--muted);">슬롯 길이 규칙 · 30분 이하 온라인, 60분 이상 오프라인</div>' +
      '<div style="font-size:13px; font-weight:700; margin:4px 0 10px;">이번 슬롯: ' + minutes + "분</div>" +
      card +
      '<button class="om-btn om-press" style="margin-top:12px;" data-action="detect-next">모임 만들기</button>' +
      "</div>";
  }
  function renderInsufficientPanel() {
    return '<div class="om-card">' + OM.ui.chip("red", "포인트 부족 · 500P 필요") +
      '<div style="font-size:11.5px; color:var(--muted); margin-top:8px;">현재 보유 ' + OM.state.user.points + "P · 참여 확정 후 디파짓 500P를 예치해요. 지금은 포인트가 부족해요.</div>" +
      '<button class="om-btn om-press" style="margin-top:10px;" data-action="topup">포인트 충전 (데모, +1000P)</button>' +
      '<button class="om-btn ghost om-press" style="margin-top:8px;" data-action="force-create">그래도 모임 만들기</button>' +
      "</div>";
  }
  function renderCreatingPanel() {
    return '<div class="om-card">' +
      '<div class="skel-line skel" style="width:70%;"></div>' +
      '<div class="skel-line skel" style="width:50%;"></div>' +
      '<div class="skel-line skel" style="width:60%;"></div>' +
      '<div style="font-size:11px; color:var(--muted); margin-top:6px;">모임을 만들고 있어요...</div>' +
      "</div>";
  }
  function renderPanel(panel) {
    switch (panel.type) {
      case "confirm": return renderConfirmPanel();
      case "reask": return renderReaskPanel();
      case "slotpicker": return renderSlotpickerPanel();
      case "headcount": return renderHeadcountPanel();
      case "onoff": return renderOnoffPanel();
      case "insufficient": return renderInsufficientPanel();
      case "creating": return renderCreatingPanel();
      default: return "";
    }
  }
  function renderHomeRoomCard(roomId) {
    var room = omFindRoom(roomId);
    if (!room) return '<div class="om-card">모임 정보를 찾을 수 없어요.</div>';
    var pct = 100 * room.participants.length / room.capacity;
    var chipHtml = room.status === "confirmed" ? OM.ui.chip("green", "확정")
      : room.status === "exploded" ? OM.ui.chip("red", "방폭")
      : OM.ui.chip("blue", "모집 중");
    var names = room.participants.map(function (p) { return p.id === "me" ? "나" : p.name; }).join(", ");
    var html = '<div class="om-card">' + chipHtml +
      '<div style="font-weight:800; font-size:14px; margin-top:8px;">' + esc(room.title) + "</div>" +
      '<div style="font-size:11px; color:var(--muted); margin:2px 0 10px;">' + esc(room.slotLabel) + " · " + (room.online === "online" ? "온라인" : "오프라인") + "</div>" +
      OM.ui.gauge(pct) +
      '<div style="font-size:11px; color:var(--muted); margin-top:6px;">' + room.participants.length + "/" + room.capacity + "명 · " + esc(names) + "</div>";
    if (room.status === "confirmed") {
      html += '<button class="om-btn om-press" style="margin-top:10px;" data-action="goto-room" data-room="' + room.id + '">모임 채팅방으로 이동</button>';
    } else if (room.status === "exploded") {
      html += '<button class="om-btn secondary om-press" style="margin-top:10px;" data-action="reset-flow">새 모임 만들기</button>';
    }
    html += "</div>";
    return html;
  }

  function syncRoomEvents() {
    if (!homeChat.roomId) return;
    var room = omFindRoom(homeChat.roomId);
    if (!room) return;
    for (var j = 0; j < room.participants.length; j++) {
      var p = room.participants[j];
      if (p.id === "me") continue;
      if (homeChat.knownParticipantIds.indexOf(p.id) === -1) {
        homeChat.knownParticipantIds.push(p.id);
        homeChat.messages.push({ kind: "bot", text: p.name + "님이 합류했어요." });
      }
    }
    if (room.status !== homeChat.lastStatus) {
      if (room.status === "confirmed") homeChat.messages.push({ kind: "bot", text: "정원이 다 찼어요! 모임이 확정됐어요." });
      else if (room.status === "exploded") homeChat.messages.push({ kind: "bot", text: "마감까지 인원을 못 채워서 모임이 방폭됐어요. 예치금은 전액 환급돼요." });
      homeChat.lastStatus = room.status;
    }
  }

  function homeRender(el, params) {
    homeEl = el; homeParams = params;
    syncRoomEvents();
    var existingInput = el.querySelector(".om-hc-input");
    if (existingInput) homeChat.inputVal = existingInput.value;
    var hadFocus = existingInput && document.activeElement === existingInput;

    var body = "";
    for (var i = 0; i < homeChat.messages.length; i++) body += renderMessage(homeChat.messages[i]);
    if (homeChat.activePanel) body += renderPanel(homeChat.activePanel);
    else body += renderExamples();

    var toastHtml = homeChat.toast ? '<div class="om-toast">' + esc(homeChat.toast) + "</div>" : "";

    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("OfficeMate", "봇에게 말해보세요", false) +
      '<div class="om-body" id="hcScroll">' + body + "</div>" +
      '<div class="om-hc-composer">' +
      '<input class="om-hc-input" type="text" placeholder="예) 목요일 점심 매운 거 3명" value="' + esc(homeChat.inputVal) + '">' +
      '<button class="om-hc-send om-press" data-action="send">' + OM.ui.icon("bolt", 16, "#fff") + "</button>" +
      "</div>" + toastHtml;

    var scrollEl = el.querySelector("#hcScroll");
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
    var ni = el.querySelector(".om-hc-input");
    if (ni && hadFocus) { ni.focus(); var vlen = ni.value.length; ni.setSelectionRange(vlen, vlen); }
  }

  function hcToast(text) {
    homeChat.toast = text;
    homeRender(homeEl, homeParams);
    clearTimeout(homeChat._toastTimer);
    homeChat._toastTimer = setTimeout(function () {
      homeChat.toast = null;
      if (homeEl && homeEl.isConnected) homeRender(homeEl, homeParams);
    }, 1800);
  }

  function doSend(text) {
    var input = homeEl.querySelector(".om-hc-input");
    var value = (text != null) ? text : (input ? input.value.trim() : "");
    if (!value) { hcToast("메시지를 입력해주세요"); return; }
    homeChat.messages.push({ kind: "me", text: value });
    homeChat.inputVal = "";
    var parsed = parseSentence(value);
    if (parsed.ok) {
      homeChat.draft = parsed.draft;
      homeChat.headcountVal = parsed.draft.capacity;
      homeChat.slotTab = "lunch";
      for (var i = 0; i < SLOT_PERIODS.length; i++) if (SLOT_PERIODS[i].label === parsed.draft.periodLabel) homeChat.slotTab = SLOT_PERIODS[i].key;
      var tagText = parsed.draft.tags.length ? parsed.draft.tags.join(", ") : "태그 없음";
      homeChat.messages.push({ kind: "bot", text: "파싱 완료 — " + parsed.draft.slotLabel + " · " + tagText + " · 정원 " + parsed.draft.capacity + "명" });
      homeChat.activePanel = { type: "confirm" };
    } else {
      homeChat.messages.push({ kind: "bot", text: buildReaskText(parsed.missing) });
      homeChat.activePanel = { type: "reask" };
    }
    homeRender(homeEl, homeParams);
  }

  function pickSlot(day, time, periodLabel) {
    homeChat.draft.dayLabel = day;
    homeChat.draft.periodLabel = periodLabel;
    homeChat.draft.slotLabel = day + " " + time;
    if (!homeChat.draft.tags) homeChat.draft.tags = [];
    if (homeChat.draft.online == null) homeChat.draft.online = homeChat.draft.tags.indexOf("커피챗") !== -1 ? "online" : "offline";
    if (homeChat.draft.capacity == null) {
      homeChat.headcountVal = homeChat.headcountVal || 3;
      homeChat.activePanel = { type: "headcount" };
    } else {
      homeChat.activePanel = { type: "confirm" };
    }
    homeRender(homeEl, homeParams);
  }
  function adjustHeadcount(delta) {
    homeChat.headcountVal = clamp((homeChat.headcountVal || 3) + delta, 2, 8);
    homeRender(homeEl, homeParams);
  }
  function confirmHeadcount() {
    homeChat.draft.capacity = homeChat.headcountVal;
    homeChat.activePanel = homeChat.draft.slotLabel ? { type: "confirm" } : { type: "slotpicker" };
    homeRender(homeEl, homeParams);
  }

  function doCreateRoom() {
    var d = homeChat.draft;
    var titleParts = [d.dayLabel || "", d.periodLabel || "", (d.tags && d.tags[0]) ? d.tags[0] : "번개", "모임"];
    var title = titleParts.join(" ").split("  ").join(" ").trim();
    var roomId = OM.sim.createRoom({
      title: title,
      slotLabel: d.slotLabel,
      tags: d.tags || [],
      capacity: d.capacity,
      online: d.online || "offline",
      deadlineInTicks: 6
    });
    homeChat.roomId = roomId;
    homeChat.knownParticipantIds = ["me"];
    homeChat.lastStatus = "recruiting";
    homeChat.messages.push({ kind: "bot", text: "모임을 만들었어요! 동료들에게 알렸어요." });
    homeChat.messages.push({ kind: "roomcard", roomId: roomId });
  }
  function startCreating() {
    homeChat.activePanel = { type: "creating" };
    homeRender(homeEl, homeParams);
    setTimeout(function () {
      if (!homeEl || !homeEl.isConnected) return;
      doCreateRoom();
      homeChat.activePanel = null;
      homeRender(homeEl, homeParams);
    }, 500);
  }
  function checkPointsAndCreate() {
    if (OM.state.user.points < 500) {
      homeChat.activePanel = { type: "insufficient" };
      homeRender(homeEl, homeParams);
    } else {
      startCreating();
    }
  }
  function resetFlow() {
    homeChat.roomId = null;
    homeChat.knownParticipantIds = [];
    homeChat.lastStatus = null;
    homeChat.activePanel = null;
    homeChat.draft = { dayLabel: null, periodLabel: null, slotLabel: null, tags: [], capacity: null, online: null };
    homeChat.messages.push({ kind: "bot", text: "새로운 모임을 만들어볼까요? 다시 말해주세요." });
    homeRender(homeEl, homeParams);
  }

  function onHomeClick(e) {
    var btn = e.target.closest ? e.target.closest("[data-action]") : null;
    if (!btn) return;
    var action = btn.getAttribute("data-action");
    if (action === "send") { doSend(); return; }
    if (action === "example") { doSend(btn.getAttribute("data-text")); return; }
    if (action === "confirm-create") { homeChat.activePanel = { type: "onoff" }; homeRender(homeEl, homeParams); return; }
    if (action === "edit-slot") { homeChat.activePanel = { type: "slotpicker" }; homeRender(homeEl, homeParams); return; }
    if (action === "edit-headcount") { homeChat.headcountVal = homeChat.draft.capacity || 3; homeChat.activePanel = { type: "headcount" }; homeRender(homeEl, homeParams); return; }
    if (action === "reask-slotpicker") { homeChat.activePanel = { type: "slotpicker" }; homeRender(homeEl, homeParams); return; }
    if (action === "slot-tab") { homeChat.slotTab = btn.getAttribute("data-tab"); homeRender(homeEl, homeParams); return; }
    if (action === "pick-slot") { pickSlot(btn.getAttribute("data-day"), btn.getAttribute("data-time"), btn.getAttribute("data-period")); return; }
    if (action === "hc-minus") { adjustHeadcount(-1); return; }
    if (action === "hc-plus") { adjustHeadcount(1); return; }
    if (action === "hc-next") { confirmHeadcount(); return; }
    if (action === "detect-next") { checkPointsAndCreate(); return; }
    if (action === "topup") { OM.sim.topUpPoints(1000); checkPointsAndCreate(); hcToast("1000P 충전됐어요 (데모)"); return; }
    if (action === "force-create") { startCreating(); return; }
    if (action === "goto-room") { OM.go("room-chat", { roomId: btn.getAttribute("data-room") }); return; }
    if (action === "reset-flow") { resetFlow(); return; }
    hcToast("준비 중인 기능이에요");
  }
  function onHomeKeydown(e) {
    if (e.key === "Enter" && e.target.classList && e.target.classList.contains("om-hc-input")) {
      e.preventDefault();
      doSend();
    }
  }

  OM.register("home", {
    title: "홈",
    render: homeRender,
    onEnter: function () {
      if (homeEl) {
        homeEl.addEventListener("click", onHomeClick);
        homeEl.addEventListener("keydown", onHomeKeydown);
      }
    },
    onLeave: function () {
      clearTimeout(homeChat._toastTimer);
    }
  });

  /* =================================================================
   * SECTION B — room-chat: 개별 모임 방 채팅 (params: {roomId})
   * ================================================================= */
  var rcEl = null;
  var rcParams = null;
  var rcLocal = {};        // roomId -> [{kind:"me", text}]
  var rcLoadingRooms = {}; // roomId -> bool
  var rcToastMsg = null;
  var rcToastTimer = null;

  function buildRoomLog(room) {
    var log = [];
    log.push({ kind: "sys", text: "모임이 개설됐어요 · " + room.slotLabel });
    for (var i = 0; i < room.participants.length; i++) {
      var p = room.participants[i];
