      log.push({ kind: "sys", text: (p.id === "me" ? "나" : p.name) + "님이 참여 중이에요." });
    }
    if (room.status === "confirmed" || room.status === "checkin-done" || room.status === "settled") {
      log.push({ kind: "sys", text: "모집이 완료되어 모임이 확정됐어요." });
    }
    if (room.reminderSent) log.push({ kind: "sys", text: "1시간 전 리마인더가 발송됐어요." });
    if (room.status === "checkin-done") log.push({ kind: "sys", text: "체크인이 마감됐어요." });
    if (room.status === "settled" && room.receipt) log.push({ kind: "sys", text: "정산 완료 · 1인당 " + room.receipt.perPerson + "P" });
    if (room.status === "exploded") log.push({ kind: "sys", text: "모집 마감까지 인원을 못 채워 방폭됐어요." });
    return log;
  }
  function renderLogLine(line) {
    if (line.kind === "me") return '<div class="om-bubble bot">' + esc(line.text) + "</div>";
    return '<div class="om-bubble">' + OM.ui.icon("bolt", 12, "#2F5EDB") + " " + esc(line.text) + "</div>";
  }
  function renderRoomActionCard(room) {
    var pct = 100 * room.participants.length / room.capacity;
    if (room.status === "recruiting") {
      return '<div class="om-card">' + OM.ui.chip("blue", "모집 중") + OM.ui.gauge(pct) +
        '<div style="font-size:11px; color:var(--muted); margin-top:6px;">' + room.participants.length + "/" + room.capacity + "명</div>" +
        '<button class="om-btn secondary om-press" style="margin-top:10px;" data-action="preview">모임 상세 보기</button></div>';
    }
    if (room.status === "confirmed") {
      return '<div class="om-card">' + OM.ui.chip("green", "확정") +
        '<div style="font-size:11.5px; color:var(--muted); margin-top:6px;">정원이 모두 채워졌어요.</div>' +
        '<button class="om-btn om-press" style="margin-top:10px;" data-action="preview">모임 상세보기</button></div>';
    }
    if (room.status === "checkin-done") {
      return '<div class="om-card">' + OM.ui.chip("blue", "체크인 완료") +
        '<div style="font-size:11.5px; color:var(--muted); margin-top:6px;">이제 정산을 진행해주세요.</div>' +
        '<button class="om-btn om-press" style="margin-top:10px;" data-action="settle">정산하러 가기</button></div>';
    }
    if (room.status === "settled") {
      return '<div class="om-card">' + OM.ui.chip("green", "정산 완료") +
        '<div style="font-size:11.5px; color:var(--muted); margin-top:6px;">1인당 ' + (room.receipt ? room.receipt.perPerson : 0) + "P · 원장에서 확인할 수 있어요.</div>" +
        '<button class="om-btn secondary om-press" style="margin-top:10px;" data-action="ledger">원장 보기</button></div>';
    }
    if (room.status === "exploded") {
      return '<div class="om-card">' + OM.ui.chip("red", "방폭") +
        '<div style="font-size:11.5px; color:var(--muted); margin-top:6px;">전액 환급됐어요.</div>' +
        '<button class="om-btn secondary om-press" style="margin-top:10px;" data-action="home">홈으로</button></div>';
    }
    return "";
  }

  function rcToast(text) {
    rcToastMsg = text;
    roomChatRender(rcEl, rcParams);
    clearTimeout(rcToastTimer);
    rcToastTimer = setTimeout(function () {
      rcToastMsg = null;
      if (rcEl && rcEl.isConnected) roomChatRender(rcEl, rcParams);
    }, 1800);
  }

  function roomChatRender(el, params) {
    rcEl = el; rcParams = params;
    var roomId = params.roomId;
    var room = omFindRoom(roomId);

    if (!room) {
      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("모임 채팅", "", true) +
        '<div class="om-body"><div class="om-card" style="text-align:center; margin-top:40px;">' +
        OM.ui.icon("warn", 26, "#8892AE") + '<div style="font-weight:700; margin-top:8px;">모임을 찾을 수 없어요</div>' +
        '<div style="font-size:11.5px; color:var(--muted); margin-top:4px;">삭제되었거나 잘못된 링크예요.</div>' +
        '<button class="om-btn secondary om-press" style="margin-top:12px;" data-om-back="1">뒤로가기</button></div></div>';
      return;
    }

    if (rcLoadingRooms[roomId] === undefined) {
      rcLoadingRooms[roomId] = true;
      setTimeout(function () {
        rcLoadingRooms[roomId] = false;
        if (rcEl && rcEl.isConnected) roomChatRender(rcEl, rcParams);
      }, 260);
    }
    if (rcLoadingRooms[roomId]) {
      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar(room.title, "불러오는 중", true) +
        '<div class="om-body">' +
        '<div class="skel-line skel" style="width:70%;"></div><div class="skel-line skel" style="width:55%;"></div><div class="skel-line skel" style="width:60%;"></div>' +
        "</div>";
      return;
    }

    var existingInput = el.querySelector(".om-rc-input");
    var inputVal = existingInput ? existingInput.value : "";
    var hadFocus = existingInput && document.activeElement === existingInput;

    var log = buildRoomLog(room);
    var extra = rcLocal[roomId] || [];
    var body = "";
    for (var i = 0; i < log.length; i++) body += renderLogLine(log[i]);
    for (var j = 0; j < extra.length; j++) body += renderLogLine(extra[j]);
    body += renderRoomActionCard(room);

    var toastHtml = rcToastMsg ? '<div class="om-toast">' + esc(rcToastMsg) + "</div>" : "";

    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar(room.title, room.slotLabel, true) +
      '<div class="om-body" id="rcScroll">' + body + "</div>" +
      '<div class="om-rc-composer">' +
      '<input class="om-rc-input" type="text" placeholder="메시지 보내기" value="' + esc(inputVal) + '">' +
      '<button class="om-rc-send om-press" data-action="send">' + OM.ui.icon("bolt", 16, "#fff") + "</button>" +
      "</div>" + toastHtml;

    var scrollEl = el.querySelector("#rcScroll");
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
    var ni = el.querySelector(".om-rc-input");
    if (ni && hadFocus) { ni.focus(); var vlen = ni.value.length; ni.setSelectionRange(vlen, vlen); }
  }

  function doRcSend() {
    var input = rcEl.querySelector(".om-rc-input");
    var value = input ? input.value.trim() : "";
    if (!value) { rcToast("메시지를 입력해주세요"); return; }
    if (!rcLocal[rcParams.roomId]) rcLocal[rcParams.roomId] = [];
    rcLocal[rcParams.roomId].push({ kind: "me", text: value });
    roomChatRender(rcEl, rcParams);
  }

  function onRcClick(e) {
    var btn = e.target.closest ? e.target.closest("[data-action]") : null;
    if (!btn) return;
    var action = btn.getAttribute("data-action");
    if (action === "send") { doRcSend(); return; }
    if (action === "preview") { OM.go("room-detail", { roomId: rcParams.roomId }); return; }
    if (action === "settle") { OM.go("settle", { roomId: rcParams.roomId }); return; }
    if (action === "ledger") { OM.go("ledger", {}); return; }
    if (action === "home") { OM.go("home", {}); return; }
    rcToast("준비 중인 기능이에요");
  }
  function onRcKeydown(e) {
    if (e.key === "Enter" && e.target.classList && e.target.classList.contains("om-rc-input")) {
      e.preventDefault();
      doRcSend();
    }
  }

  OM.register("room-chat", {
    title: "모임 채팅",
    render: roomChatRender,
    onEnter: function (params) {
      if (rcEl) {
        rcEl.addEventListener("click", onRcClick);
        rcEl.addEventListener("keydown", onRcKeydown);
      }
      rcLoadingRooms[params.roomId] = undefined; // force loading flash on fresh entry
      delete rcLoadingRooms[params.roomId];
    },
    onLeave: function () {
      clearTimeout(rcToastTimer);
    }
  });
})();
</script>
<script>
(function () {
  "use strict";

  /* ---------------- shared local helpers (module-scoped, no OM.state writes) ---------------- */
  function findRoom(id) {
    var rooms = OM.state.rooms;
    for (var i = 0; i < rooms.length; i++) if (rooms[i].id === id) return rooms[i];
    return null;
  }
  function findParticipant(room, pid) {
    if (!room) return null;
    for (var i = 0; i < room.participants.length; i++) if (room.participants[i].id === pid) return room.participants[i];
    return null;
  }
  function colleagueInfo(id) {
    if (id === "me") return { id: "me", name: OM.state.user.name, dept: OM.state.user.dept };
    var list = OM._colleagues;
    for (var i = 0; i < list.length; i++) if (list[i].id === id) return list[i];
    return { id: id, name: "동료", dept: "" };
  }
  function initials(name) { return name ? name.slice(0, 1) : "?"; }
  function sumChars(str) {
    var s = 0;
    for (var i = 0; i < str.length; i++) s += str.charCodeAt(i);
    return s;
  }
  function esc(s) {
    if (s == null) return "";
    return String(s).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;");
  }
  function toast(el, msg) {
    var old = el.querySelector(".om-toast");
    if (old && old.parentNode) old.parentNode.removeChild(old);
    var d = document.createElement("div");
    d.className = "om-toast";
    d.textContent = msg;
    el.appendChild(d);
    setTimeout(function () { if (d.parentNode) d.parentNode.removeChild(d); }, 1700);
  }
  function bindOnce(el, handler) {
    if (!el._omBound) { el.addEventListener("click", handler); el._omBound = true; }
  }
  function notFoundScreen(el, title) {
    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar(title, "", true) +
      '<div class="om-body"><div class="om-c-empty">' + OM.ui.icon("warn", 26, "#8892AE") +
      '<div style="margin-top:8px;">모임을 찾을 수 없어요.<br>이미 종료되었거나 잘못된 링크예요.</div></div></div>';
  }

  var ICEBREAKERS = [
    "요즘 가장 몰입하고 있는 일이 뭐예요?",
    "최근에 본 것 중 가장 재밌었던 콘텐츠는?",
    "점심시간에 꼭 지키는 나만의 규칙이 있나요?",
    "요즘 배우고 싶은 게 있다면?",
    "이번 주 나를 웃게 한 순간은?",
    "커피 vs 차, 그리고 그 이유는?"
  ];
  var PLACES_OFFLINE = ["회사 근처 '정성한상' — 매운 음식 전문", "3층 라운지 옆 '브런치 하우스'", "테라스가 있는 '카페 온기'", "지하 1층 사내 카페테리아 VIP존"];
  var PLACES_ONLINE = ["화상 회의실 B — 편하게 카메라 켜고 진행", "사내 보이스룸 3번", "팀 채팅 음성 채널"];
  function pickIcebreaker(room) { return ICEBREAKERS[sumChars(room.id) % ICEBREAKERS.length]; }
  function pickPlace(room) {
    var bank = room.online === "online" ? PLACES_ONLINE : PLACES_OFFLINE;
    return bank[sumChars(room.id + room.tags.join("")) % bank.length];
  }

  var STATUS_CHIP = {
    recruiting: OM.ui.chip("blue", "모집 중"),
    confirmed: OM.ui.chip("green", "확정"),
    exploded: OM.ui.chip("red", "방폭"),
    "checkin-done": OM.ui.chip("amber", "체크인 완료"),
    settled: OM.ui.chip("grey", "정산 완료")
  };

  /* =====================================================================
     room-detail
     ===================================================================== */
  var defRoomDetail = {
    title: "모임 상세",
    render: function (el, params) {
      var room = findRoom(params.roomId);
      if (!el.dataset.omLoaded) {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("모임 상세", room ? room.slotLabel : "", true) +
          '<div class="om-body">' +
          '<div class="om-card"><div class="skel-line skel" style="width:55%"></div><div class="skel-line skel" style="width:85%"></div><div class="skel-line skel" style="width:35%"></div></div>' +
          '<div class="om-card"><div class="skel-line skel" style="width:70%"></div><div class="skel-line skel" style="width:50%"></div></div>' +
          '</div>';
        el.dataset.omLoaded = "pending";
        setTimeout(function () { el.dataset.omLoaded = "1"; defRoomDetail.render(el, params); }, 380);
        return;
      }
      if (!room) { notFoundScreen(el, "모임 상세"); return; }
      var me = findParticipant(room, "me");
      var tagsHtml = room.tags.map(function (t) { return OM.ui.chip("blue", t); }).join(" ");
      var partHtml = room.participants.map(function (p) {
        var info = colleagueInfo(p.id);
        var st = p.noshow ? OM.ui.chip("red", "노쇼") : (p.checkedIn ? OM.ui.chip("green", "체크인") : (p.deposited ? OM.ui.chip("grey", "예치완료") : OM.ui.chip("amber", "예치 대기")));
        return '<div class="om-c-row"><span class="om-c-avatar">' + esc(initials(info.name)) + '</span>' +
          '<div style="flex:1;"><div class="om-c-name">' + esc(info.name) + (p.id === "me" ? " (나)" : "") + '</div><div class="om-c-sub">' + esc(info.dept || "") + '</div></div>' + st + '</div>';
      }).join("");

      var cta = "";
      if (room.status === "exploded") {
        cta = '<div class="om-card" style="text-align:center; color:var(--danger); font-size:12px; font-weight:700;">인원 미달로 방폭되었어요. 예치금은 전액 환급되었어요.</div>' +
          '<button class="om-btn secondary om-press" data-action="explore">다른 모임 보러가기</button>';
      } else if (room.status === "settled") {
        cta = '<button class="om-btn om-press" data-action="settle">정산 결과 보기</button>';
      } else if (room.status === "checkin-done") {
        cta = '<button class="om-btn om-press" data-action="settle">정산하러 가기</button>';
      } else if (room.status === "confirmed") {
        if (!me) {
          cta = '<div class="om-c-empty">이미 인원이 마감된 모임이에요.</div>';
        } else if (room.reminderSent) {
          cta = '<button class="om-btn om-press" data-action="reminder">리마인더 보기</button>';
        } else if (!me.deposited) {
          cta = '<button class="om-btn om-press" data-action="deposit">디파짓 예치하기</button>';
        } else {
          cta = '<button class="om-btn secondary om-press" data-action="chat">채팅방으로 이동</button>';
        }
      } else {
        if (!me) {
          cta = '<button class="om-btn om-press" data-action="join">참여하기 (500P 예치 필요)</button>';
        } else if (!me.deposited) {
          cta = '<button class="om-btn om-press" data-action="deposit">디파짓 예치하기</button>';
        } else {
          cta = '<button class="om-btn ghost om-press" disabled>예치 완료 · 모집 대기 중</button>';
        }
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("모임 상세", room.slotLabel, true) +
        '<div class="om-body">' +
        '<div class="om-card">' +
        '<div style="display:flex; align-items:center; justify-content:space-between;"><div style="font-weight:800; font-size:14.5px;">' + esc(room.title) + '</div>' + STATUS_CHIP[room.status] + '</div>' +
        '<div style="margin-top:6px;">' + tagsHtml + ' ' + OM.ui.chip("grey", room.online === "online" ? "온라인" : "오프라인") + '</div>' +
        '<div style="margin-top:10px;">' + OM.ui.gauge(100 * room.participants.length / room.capacity) + '</div>' +
        '<div class="om-c-sub" style="margin-top:4px;">' + room.participants.length + ' / ' + room.capacity + '명 모집</div>' +
        '</div>' +
        '<div class="om-card"><div style="font-weight:800; font-size:12.5px; margin-bottom:4px;">참여 멤버</div>' + partHtml + '</div>' +
        '<div class="om-card">' + OM.ui.icon("chat", 15, "#2F5EDB") + ' <span style="font-weight:700; font-size:12px; margin-left:4px;">아이스브레이커 질문</span>' +
        '<div class="om-c-sub" style="margin-top:6px; color:var(--ink2);">"' + esc(pickIcebreaker(room)) + '"</div></div>' +
        '<div class="om-card">' + OM.ui.icon("building", 15, "#2F5EDB") + ' <span style="font-weight:700; font-size:12px; margin-left:4px;">추천 장소</span>' +
        '<div class="om-c-sub" style="margin-top:6px; color:var(--ink2);">' + esc(pickPlace(room)) + '</div></div>' +
        cta +
        '</div>';

      bindOnce(el, function (e) {
        var btn = e.target.closest ? e.target.closest("[data-action]") : null;
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        var r = findRoom(params.roomId);
        if (!r) return;
        if (action === "join") {
          var res = OM.sim.joinRoom(r.id);
          if (!res.ok) toast(el, res.reason === "full" ? "이미 인원이 마감됐어요." : "참여할 수 없어요.");
          else toast(el, "참여 완료! 500P 예치가 필요해요.");
        } else if (action === "deposit") { OM.go("deposit", { roomId: r.id }); }
        else if (action === "reminder") { OM.go("reminder", { roomId: r.id }); }
        else if (action === "chat") { OM.go("room-chat", { roomId: r.id }); }
        else if (action === "settle") { OM.go("settle", { roomId: r.id }); }
        else if (action === "explore") { OM.go("explore", {}); }
      });
    },
    onEnter: function () {},
    onLeave: function () {}
  };
  OM.register("room-detail", defRoomDetail);

  /* =====================================================================
     deposit — 500P 예치, 3회 면제 로직(세션 내 로컬 카운터), 부족 시 분기
     ===================================================================== */
  var depositExemptRemaining = 3;
  var depositExemptedRooms = {};

  var defDeposit = {
    title: "디파짓 예치",
    render: function (el, params) {
      var room = findRoom(params.roomId);
      if (!room) { notFoundScreen(el, "디파짓 예치"); return; }

      bindOnce(el, function (e) {
        var btn = e.target.closest ? e.target.closest("[data-action]") : null;
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        var r = findRoom(params.roomId);
        if (!r) return;
        if (action === "join") {
          var jres = OM.sim.joinRoom(r.id);
          if (!jres.ok) toast(el, "참여할 수 없어요.");
          return;
        }
        if (action === "pay") {
          var payAmount = (r.sponsored && r.couponApplied) ? (500 - Math.round(500 * (r.couponPercent || 15) / 100)) : 500;
          var res = OM.sim.payDeposit(r.id, payAmount);
          if (!res.ok && res.reason === "insufficient") {
            el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("디파짓 예치", r.slotLabel, true) +
              '<div class="om-body"><div class="om-card" style="text-align:center;">' + OM.ui.icon("warn", 26, "#E05A5A") +
              '<div style="font-weight:800; font-size:13px; margin-top:6px; color:var(--danger);">포인트가 부족해요</div>' +
              '<div class="om-c-sub" style="margin-top:2px;">현재 ' + OM.state.user.points + 'P · ' + payAmount + 'P 필요</div></div>' +
              '<button class="om-btn om-press" data-action="topup">1000P 충전하기</button>' +
              '<button class="om-btn ghost om-press" data-om-back="1">뒤로가기</button></div>';
          } else if (res.ok) {
            toast(el, payAmount + "P 예치 완료!");
          }
        } else if (action === "exempt") {
          if (depositExemptRemaining > 0 && !depositExemptedRooms[r.id]) {
            var eres = OM.sim.payDeposit(r.id, 1);
            if (eres.ok) {
              depositExemptRemaining--;
              depositExemptedRooms[r.id] = true;
              toast(el, "면제권을 사용했어요. (1P만 예치)");
            } else {
              toast(el, "면제권을 사용할 수 없어요.");
            }
          }
        } else if (action === "cancel") {
          var cres = OM.sim.cancelDeposit(r.id);
          if (cres.ok) toast(el, cres.penalty ? "250P 페널티가 적용되어 환급됐어요." : "전액 환급됐어요.");
          else toast(el, "취소할 수 없어요.");
        } else if (action === "topup") {
          OM.sim.topUpPoints(1000);
          toast(el, "1000P 충전 완료!");
        }
      });

      var me = findParticipant(room, "me");
      if (!me) {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("디파짓 예치", room.slotLabel, true) +
          '<div class="om-body"><div class="om-c-empty">먼저 모임에 참여해야 예치할 수 있어요.</div>' +
          '<button class="om-btn om-press" data-action="join">참여하기</button></div>';
        return;
      }

      var exempted = !!depositExemptedRooms[room.id];
      var coupon = !!(room.sponsored && room.couponApplied);
      var discountAmount = coupon ? Math.round(500 * (room.couponPercent || 15) / 100) : 0;
      var depositAmount = 500 - discountAmount;
      var body;
      if (me.deposited) {
        var withinPenalty = OM.state.tick >= room.slotTick - 2;
        body = '<div class="om-card" style="text-align:center;">' + OM.ui.icon("check", 26, "#22A06B") +
          '<div style="font-weight:800; font-size:13px; margin-top:6px;">예치 완료</div>' +
          '<div class="om-c-sub" style="margin-top:2px;">' + (exempted ? "면제권으로 예치했어요." : depositAmount + "P가 예치되었어요." + (coupon ? " (스폰서 쿠폰 " + discountAmount + "P 할인 적용)" : "")) + '</div></div>' +
          '<button class="om-btn danger om-press" data-action="cancel">예치 취소하기</button>' +
          '<div class="om-c-sub" style="text-align:center; margin-top:6px;">' + (withinPenalty ? "모임 시작 2시간 이내 취소 시 250P 페널티가 적용돼요." : "지금 취소하면 전액 환급돼요.") + '</div>';
      } else {
        body = '<div class="om-card"><div style="font-weight:800; font-size:13px;">모임 참여 디파짓</div>' +
          '<div class="om-c-sub" style="margin-top:4px;">노쇼 방지를 위해 ' + depositAmount + 'P를 예치해요. 참석하면 체크인 시 그대로 돌아와요.' + (coupon ? " (스폰서 쿠폰 " + discountAmount + "P 할인 적용됨)" : "") + '</div>' +
          '<div style="margin-top:10px; display:flex; justify-content:space-between; font-size:12px;"><span>내 포인트</span><b>' + OM.state.user.points + 'P</b></div>' +
          '<div style="margin-top:4px; display:flex; justify-content:space-between; font-size:12px; color:var(--ink2);"><span>남은 면제권</span><b>' + depositExemptRemaining + '회</b></div>' +
          '</div>' +
          (depositExemptRemaining > 0 ? '<button class="om-btn secondary om-press" data-action="exempt">면제권으로 예치하기 (1P만)</button>' : "") +
          '<button class="om-btn om-press" data-action="pay">' + depositAmount + 'P 예치하기</button>';
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("디파짓 예치", room.slotLabel, true) + '<div class="om-body">' + body + '</div>';
    },
    onEnter: function () {},
    onLeave: function () {}
  };
  OM.register("deposit", defDeposit);

  /* =====================================================================
     reminder — 1시간 전 카드, 참석/취소, 대기자 승급 플레이버
     ===================================================================== */
  var defReminder = {
    title: "리마인더",
    render: function (el, params) {
      var room = findRoom(params.roomId);
      if (!room) { notFoundScreen(el, "리마인더"); return; }
      var me = findParticipant(room, "me");

      if (!me) {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("리마인더", room.slotLabel, true) +
          '<div class="om-body"><div class="om-c-empty">' + OM.ui.icon("clock", 24, "#8892AE") +
          '<div style="margin-top:8px;">참여를 취소한 모임이에요.<br>다음 대기자에게 자리가 안내됐어요.</div></div></div>';
        return;
      }
      if (room.status !== "confirmed" || !room.reminderSent) {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("리마인더", room.slotLabel, true) +
          '<div class="om-body"><div class="om-c-empty">아직 리마인더가 도착하지 않았어요.<br>모임이 확정되고 1시간 전이 되면 알려드려요.</div></div>';
        return;
      }
      var partHtml = room.participants.map(function (p) {
        var info = colleagueInfo(p.id);
        return '<span class="om-c-avatar" style="margin-right:4px;" title="' + esc(info.name) + '">' + esc(initials(info.name)) + '</span>';
      }).join("");

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("리마인더", room.slotLabel, true) +
        '<div class="om-body">' +
        '<div class="om-card" style="border:1.5px solid #F0A64E;">' + OM.ui.icon("clock", 22, "#F0A64E") +
        '<div style="font-weight:800; font-size:13.5px; margin-top:6px;">1시간 뒤 모임이 시작돼요</div>' +
        '<div class="om-c-sub" style="margin-top:2px;">' + esc(room.title) + ' · ' + esc(room.slotLabel) + '</div>' +
        '<div style="margin-top:8px;">' + partHtml + '</div></div>' +
        '<button class="om-btn om-press" data-action="attend">참석해요</button>' +
        '<button class="om-btn ghost om-press" data-action="cancel">취소할게요</button>' +
        '</div>';

      bindOnce(el, function (e) {
        var btn = e.target.closest ? e.target.closest("[data-action]") : null;
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        var r = findRoom(params.roomId);
        if (!r) return;
        if (action === "attend") {
          toast(el, "참석으로 표시했어요. 곧 만나요!");
        } else if (action === "cancel") {
          var res = OM.sim.cancelDeposit(r.id);
          if (res.ok) toast(el, (res.penalty ? "250P 페널티 적용 · " : "") + "취소됐어요. 대기자에게 자리를 안내했어요.");
          else toast(el, "예치 내역이 없어 자동 취소할 수 없어요.");
        }
      });
    },
    onEnter: function () {},
    onLeave: function () {}
  };
  OM.register("reminder", defReminder);

  /* =====================================================================
     checkin — 수동 탭 + QR SIM 탭
     ===================================================================== */
  var defCheckin = {
    title: "체크인",
    render: function (el, params) {
      var room = findRoom(params.roomId);
      if (!room) { notFoundScreen(el, "체크인"); return; }

      bindOnce(el, function (e) {
        var tabBtn = e.target.closest ? e.target.closest("[data-tab]") : null;
        if (tabBtn) { el.dataset.omTab = tabBtn.getAttribute("data-tab"); defCheckin.render(el, params); return; }
        var btn = e.target.closest ? e.target.closest("[data-action]") : null;
        if (!btn) return;
        var r = findRoom(params.roomId);
        if (!r) return;
        var action = btn.getAttribute("data-action");
        if (action === "checkin") { OM.sim.checkin(r.id, btn.getAttribute("data-pid")); toast(el, "체크인했어요."); }
        else if (action === "noshow") {
          var pid = btn.getAttribute("data-pid");
          OM.sim.markNoshow(r.id, pid);
          OM.go("noshow", { roomId: r.id, participantId: pid });
        } else if (action === "scan") { OM.sim.checkin(r.id, "me"); toast(el, "QR 스캔 완료! 체크인됐어요."); }
        else if (action === "confirm") { OM.sim.confirmCheckin(r.id); toast(el, "체크인이 마감됐어요."); }
        else if (action === "settle") { OM.go("settle", { roomId: r.id }); }
        else if (action === "viewnoshow") { OM.go("noshow", { roomId: r.id, participantId: btn.getAttribute("data-pid") }); }
      });

      if (room.status !== "confirmed" && room.status !== "checkin-done") {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("체크인", room.slotLabel, true) +
          '<div class="om-body"><div class="om-c-empty">' + OM.ui.icon("lock", 24, "#8892AE") +
          '<div style="margin-top:8px;">아직 체크인을 시작할 수 없어요.<br>모임이 확정되면 체크인이 열려요.</div></div></div>';
        return;
      }

      if (room.status === "checkin-done") {
        var rows = room.participants.map(function (p) {
          var info = colleagueInfo(p.id);
          var chip = p.noshow ? OM.ui.chip("red", "노쇼") : OM.ui.chip("green", "참석 · +50P");
          var noshowBtn = p.noshow ? '<button class="om-btn ghost auto om-press" style="margin-left:6px;" data-action="viewnoshow" data-pid="' + p.id + '">상세</button>' : "";
          return '<div class="om-c-row"><span class="om-c-avatar">' + esc(initials(info.name)) + '</span>' +
            '<div style="flex:1;" class="om-c-name">' + esc(info.name) + (p.id === "me" ? " (나)" : "") + '</div>' + chip + noshowBtn + '</div>';
        }).join("");
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("체크인", room.slotLabel, true) +
          '<div class="om-body"><div class="om-card"><div style="font-weight:800; font-size:12.5px; margin-bottom:4px;">체크인 결과</div>' + rows + '</div>' +
          '<button class="om-btn om-press" data-action="settle">정산하러 가기</button></div>';
        return;
      }

      var tab = el.dataset.omTab || "manual";
      var tabbar = '<div class="om-c-tabbar">' +
        '<button class="om-c-tabbtn' + (tab === "manual" ? " active" : "") + '" data-tab="manual">수동 체크인</button>' +
        '<button class="om-c-tabbtn' + (tab === "qr" ? " active" : "") + '" data-tab="qr">QR 스캔</button></div>';

      var content;
      if (tab === "manual") {
        content = room.participants.map(function (p) {
          var info = colleagueInfo(p.id);
          var action = p.checkedIn
            ? OM.ui.chip("green", "체크인 완료")
            : p.noshow
              ? OM.ui.chip("red", "노쇼 처리됨")
              : '<button class="om-btn auto om-press" data-action="checkin" data-pid="' + p.id + '">체크인</button>' +
                '<button class="om-btn ghost auto om-press" style="margin-left:6px;" data-action="noshow" data-pid="' + p.id + '">노쇼 처리</button>';
          return '<div class="om-c-row"><span class="om-c-avatar">' + esc(initials(info.name)) + '</span>' +
            '<div style="flex:1;" class="om-c-name">' + esc(info.name) + (p.id === "me" ? " (나)" : "") + '</div>' + action + '</div>';
        }).join("");
        content = '<div class="om-card">' + content + '</div>';
      } else {
        var me = findParticipant(room, "me");
        content = '<div class="om-card" style="text-align:center;">' +
          '<div style="font-weight:700; font-size:12px; margin-bottom:8px;">내 QR 코드</div>' +
          OM.ui.qrGrid() +
          '<div class="om-c-sub" style="margin-top:8px;">모임장에게 이 화면을 보여주세요.</div>' +
          (me && !me.checkedIn ? '<button class="om-btn om-press" style="margin-top:10px;" data-action="scan">QR 스캔 시뮬레이션</button>' : '<div class="om-c-sub" style="margin-top:10px; color:var(--good-dark); font-weight:700;">이미 체크인했어요.</div>') +
          '</div>';
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("체크인", room.slotLabel, true) +
        '<div class="om-body">' + tabbar + content +
        '<button class="om-btn secondary om-press" data-action="confirm">체크인 마감하고 확인</button>' +
        '</div>';
    },
    onEnter: function () {},
    onLeave: function () {}
  };
  OM.register("checkin", defCheckin);

  /* =====================================================================
     noshow — 몰수 → 분배 → 신뢰도 하락
     ===================================================================== */
  var TRUST_RANK = { "상": 3, "중": 2, "하": 1 };
  function trustFromRank(rank) { return rank >= 3 ? "상" : (rank >= 2 ? "중" : "하"); }

  var defNoshow = {
    title: "노쇼",
    render: function (el, params) {
      var room = findRoom(params.roomId);
      if (!room) { notFoundScreen(el, "노쇼 처리"); return; }
      var p = findParticipant(room, params.participantId);
      if (!p) {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("노쇼 처리", room.slotLabel, true) +
          '<div class="om-body"><div class="om-c-empty">대상 참여자를 찾을 수 없어요.</div></div>';
        return;
      }
      var info = colleagueInfo(p.id);
      var others = room.participants.filter(function (x) { return x.id !== p.id && !x.noshow; });
      var share = others.length ? Math.round(500 / others.length) : 0;
      var isMe = p.id === "me";

      var trustBlock = "";
      if (isMe) {
        var curRank = TRUST_RANK[OM.state.user.trust] || 3;
        var nextRank = OM.state.user.noshowCount >= 3 ? 1 : (OM.state.user.noshowCount >= 1 ? Math.min(curRank, 2) : curRank);
        trustBlock = '<div class="om-card"><div style="font-weight:800; font-size:12.5px;">신뢰도 영향</div>' +
          '<div class="om-c-sub" style="margin-top:4px;">현재 신뢰도 <b style="color:var(--ink);">' + OM.state.user.trust + '</b> · 노쇼 ' + OM.state.user.noshowCount + '회' +
          (nextRank < curRank ? ' → 확인 시 <b style="color:var(--danger);">' + trustFromRank(nextRank) + '</b>로 하락' : "") + '</div></div>' +
          '<button class="om-btn om-press" data-action="ack">확인했어요</button>';
      } else {
        trustBlock = '<div class="om-card"><div style="font-weight:800; font-size:12.5px;">동료 신뢰도</div>' +
          '<div class="om-c-sub" style="margin-top:4px;">' + esc(info.name) + '님의 신뢰도가 다음 모임부터 낮게 반영돼요.</div></div>' +
          '<button class="om-btn secondary om-press" data-action="ack">확인</button>';
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("노쇼 처리", room.slotLabel, true) +
        '<div class="om-body">' +
        '<div class="om-card" style="text-align:center; border:1.5px solid #E05A5A;">' + OM.ui.icon("warn", 24, "#E05A5A") +
        '<div style="font-weight:800; font-size:13px; margin-top:6px;">' + esc(info.name) + (isMe ? " (나)" : "") + '님이 노쇼했어요</div>' +
        '<div style="margin-top:6px;">' + OM.ui.chip("red", "노쇼 처리됨") + '</div></div>' +
        '<div class="om-card"><div style="font-weight:800; font-size:12.5px;">예치금 몰수 · 분배</div>' +
        '<div class="om-c-receiptrow"><span>몰수 금액</span><b>500P</b></div>' +
        '<div class="om-c-receiptrow"><span>분배 대상</span><b>' + others.length + '명</b></div>' +
        '<div class="om-c-receiptrow"><span>1인당 분배</span><b>' + share + 'P</b></div></div>' +
        trustBlock +
        '<button class="om-btn ghost om-press" data-action="settle">정산 계속하기</button>' +
        '</div>';

      bindOnce(el, function (e) {
        var btn = e.target.closest ? e.target.closest("[data-action]") : null;
        if (!btn) return;
        var r = findRoom(params.roomId);
        if (!r) return;
        var action = btn.getAttribute("data-action");
        if (action === "ack") {
          OM.sim.markNoshow(r.id, params.participantId);
          if (isMe) {
            var cur = TRUST_RANK[OM.state.user.trust] || 3;
            var next = OM.state.user.noshowCount >= 3 ? 1 : (OM.state.user.noshowCount >= 1 ? Math.min(cur, 2) : cur);
            if (next < cur) OM.sim.updateProfile({ trust: trustFromRank(next) });
          }
          toast(el, "확인했어요.");
        } else if (action === "settle") { OM.go("settle", { roomId: r.id }); }
      });
    },
    onEnter: function () {},
    onLeave: function () {}
  };
  OM.register("noshow", defNoshow);

  /* =====================================================================
     settle — 총액 선결제 → 결제수단 → 나 제외 요청 → 순차 입금 연출 → 영수증
     ===================================================================== */
  function startSettleSequence(el, params) {
    var idx = parseInt(el.dataset.omSettleIdx || "0", 10);
    var payers = el._omSettlePayers || [];
    if (idx >= payers.length) { el.dataset.omSettleDone = "1"; defSettle.render(el, params); return; }
    setTimeout(function () {
      if (!el.isConnected) return;
      el.dataset.omSettleIdx = String(idx + 1);
      defSettle.render(el, params);
      startSettleSequence(el, params);
    }, 480);
  }

  var defSettle = {
    title: "정산",
    render: function (el, params) {
      var room = findRoom(params.roomId);
      if (!room) { notFoundScreen(el, "정산"); return; }

      bindOnce(el, function (e) {
        var methodBtn = e.target.closest ? e.target.closest("[data-method]") : null;
        if (methodBtn) { el.dataset.omMethod = methodBtn.getAttribute("data-method"); defSettle.render(el, params); return; }
        var btn = e.target.closest ? e.target.closest("[data-action]") : null;
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        var r = findRoom(params.roomId);
        if (!r) return;
        if (action === "done") { OM.go("my", {}); return; }
        if (action !== "start") return;
        var input = el.querySelector("#omSettleAmt");
        var amt = input ? parseInt(input.value, 10) : 0;
        if (!amt || amt <= 0) { toast(el, "결제 금액을 입력해주세요."); return; }
        el._omAmount = amt;
        var m = el.dataset.omMethod;
        if (!m) { toast(el, "결제 수단을 선택해주세요."); return; }
        var res = OM.sim.settleRoom(r.id, { totalAmount: amt, method: m });
        if (res.ok) {
          el._omSettlePayers = findRoom(r.id).participants.filter(function (p) { return !p.noshow && p.id !== "me"; });
          el.dataset.omSettleIdx = "0";
          delete el.dataset.omSettleDone;
          startSettleSequence(el, params);
        }
      });

      if (room.status === "settled") {
        var otherPayers = el._omSettlePayers || room.participants.filter(function (p) { return !p.noshow && p.id !== "me"; });
        var animating = !!(el._omSettlePayers && !el.dataset.omSettleDone);
        var idx = animating ? parseInt(el.dataset.omSettleIdx || "0", 10) : otherPayers.length;
        var meInfo = colleagueInfo("me");
        var seqRows = '<div class="om-c-seqitem done"><span class="om-c-dot done"></span>' + esc(meInfo.name) + ' (나 · 선결제 완료)</div>' +
          otherPayers.map(function (p, i) {
            var info = colleagueInfo(p.id);
            var done = i < idx;
            return '<div class="om-c-seqitem' + (done ? " done" : "") + '"><span class="om-c-dot' + (done ? " done" : "") + '"></span>' +
              esc(info.name) + (done ? " · 입금 확인" : " · 요청 대기 중") + '</div>';
          }).join("");

        var receiptHtml = "";
        if (!animating) {
          receiptHtml = '<div class="om-card"><div style="font-weight:800; font-size:13px; margin-bottom:6px;">' + OM.ui.icon("receipt", 15, "#2F5EDB") + ' 영수증</div>' +
            '<div class="om-c-receiptrow"><span>총 결제 금액</span><b>' + room.receipt.totalAmount.toLocaleString() + 'P</b></div>' +
            '<div class="om-c-receiptrow"><span>결제 수단</span><b>' + esc(room.receipt.method) + '</b></div>' +
            '<div class="om-c-receiptrow"><span>1인당 정산액</span><b>' + room.receipt.perPerson.toLocaleString() + 'P</b></div>' +
            '<div class="om-c-receiptrow"><span>정산 인원</span><b>' + (otherPayers.length + 1) + '명</b></div></div>' +
            '<button class="om-btn om-press" data-action="done">완료</button>';
        }

        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("정산", room.slotLabel, true) +
          '<div class="om-body">' +
          '<div class="om-card"><div style="font-weight:800; font-size:12.5px; margin-bottom:4px;">' + (animating ? "순차 입금 확인 중..." : "정산 완료") + '</div>' + seqRows + '</div>' +
          receiptHtml +
          '</div>';
        return;
      }

      if (room.status !== "checkin-done") {
        el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("정산", room.slotLabel, true) +
          '<div class="om-body"><div class="om-c-empty">체크인 완료 후 정산할 수 있어요.</div></div>';
        return;
      }

      var method = el.dataset.omMethod || "";
      var methods = ["카드", "간편결제", "계좌이체"];
      var methodHtml = methods.map(function (m) {
        return '<button class="om-c-chipbtn' + (method === m ? " active" : "") + '" data-method="' + m + '">' + m + '</button>';
      }).join(" ");

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("정산", room.slotLabel, true) +
        '<div class="om-body">' +
        '<div class="om-card"><div style="font-weight:800; font-size:12.5px;">총 결제 금액 (내가 선결제)</div>' +
        '<input id="omSettleAmt" type="number" min="0" step="1000" value="' + (el._omAmount || 30000) + '" ' +
        'style="width:100%; margin-top:8px; padding:10px 12px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; font-weight:700;">' +
        '</div>' +
        '<div class="om-card"><div style="font-weight:800; font-size:12.5px; margin-bottom:8px;">결제 수단</div>' +
        '<div style="display:flex; gap:6px; flex-wrap:wrap;">' + methodHtml + '</div></div>' +
        '<div class="om-c-sub" style="margin-bottom:8px;">확정 시 나를 제외한 참석자에게 각자 몫을 순차로 요청해요.</div>' +
        '<button class="om-btn om-press" data-action="start">정산 시작</button>' +
        '</div>';
    },
    onEnter: function () {},
    onLeave: function () {}
  };
  OM.register("settle", defSettle);
})();
</script>
<script>
/* =============================== explore =============================== */
(function () {
  var TAG_LABELS = ["매운맛", "커피챗", "베이커리", "러닝", "채식", "보드게임"];
  var filterMode = "all"; // "all" | "online" | "offline" — ephemeral UI state, not OM store
  var loaded = false;
  var loadTimer = null;
  var toastMsg = null;
  var toastTimer = null;
  var lastEl = null, lastParams = null;

  function flashToast(msg) {
    toastMsg = msg;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastMsg = null;
      if (lastEl) render(lastEl, lastParams);
    }, 1600);
    if (lastEl) render(lastEl, lastParams);
  }

  function sponsoredBadge() {
    return '<span class="om-chip amber">' + OM.ui.icon("percent", 10, "#8A5A16") + ' 스폰서드</span>';
  }

  function roomCard(room) {
    var pct = 100 * room.participants.length / room.capacity;
    var onlineChip = room.online === "online"
      ? '<span class="om-chip blue">' + OM.ui.icon("video", 10, "#1B3EA8") + ' 온라인</span>'
      : '<span class="om-chip grey">오프라인</span>';
    var tagsHtml = "";
    for (var i = 0; i < room.tags.length; i++) tagsHtml += OM.ui.chip("grey", "#" + room.tags[i]);
    var sponsorBtn = room.sponsored
      ? '<button class="om-btn secondary auto om-press" data-action="offer" data-room="' + room.id + '">쿠폰 보기</button>'
      : "";
    return '<div class="om-card' + (room.sponsored ? " om-scr-explore-sponsorcard" : "") + '" data-action="preview" data-room="' + room.id + '" style="cursor:pointer;">' +
      '<div class="om-scr-explore-metarow">' + (room.sponsored ? sponsoredBadge() : "") + onlineChip + '</div>' +
      '<div class="om-scr-explore-roomtitle">' + room.title + '</div>' +
      '<div style="font-size:11.5px; color:var(--muted); font-weight:700; margin-top:2px;">' + room.slotLabel + '</div>' +
      '<div class="om-scr-explore-tagrow">' + tagsHtml + '</div>' +
      OM.ui.gauge(pct) +
      '<div class="om-scr-explore-bottomrow">' +
      '<span class="om-scr-explore-count">' + room.participants.length + ' / ' + room.capacity + '명 모집</span>' +
      sponsorBtn +
      '</div></div>';
  }

  function render(el, params) {
    lastEl = el; lastParams = params;
    var body;
    if (!loaded) {
      body = '<div class="om-body">' +
        '<div class="om-card"><div class="skel-line skel" style="width:60%;"></div><div class="skel-line skel" style="width:90%;"></div><div class="skel-line skel" style="width:40%;"></div></div>' +
        '<div class="om-card"><div class="skel-line skel" style="width:55%;"></div><div class="skel-line skel" style="width:85%;"></div><div class="skel-line skel" style="width:35%;"></div></div>' +
        '</div>';
    } else {
      var rooms = OM.state.rooms.filter(function (r) { return r.status === "recruiting"; });
      if (filterMode !== "all") rooms = rooms.filter(function (r) { return r.online === filterMode; });

      var filterBar = '<div class="om-scr-explore-filterbar">' +
        '<button class="om-scr-explore-filterbtn om-press' + (filterMode === "all" ? " active" : "") + '" data-filter="all">전체</button>' +
        '<button class="om-scr-explore-filterbtn om-press' + (filterMode === "online" ? " active" : "") + '" data-filter="online">온라인</button>' +
        '<button class="om-scr-explore-filterbtn om-press' + (filterMode === "offline" ? " active" : "") + '" data-filter="offline">오프라인</button>' +
        '</div>';

      if (rooms.length === 0) {
        body = '<div class="om-body">' + filterBar +
          '<div class="om-scr-explore-empty">' +
          OM.ui.icon("compass", 34, "#8892AE") +
          '<div class="headline">모집 중인 모임이 없어요</div>' +
          '<div class="sub">조건에 맞는 모임이 아직 없어요.<br>새 모임을 만들어서 동료들을 모아보세요.</div>' +
          '<button class="om-btn auto om-press" style="margin-top:16px;" data-action="new-room">새 모임 만들기</button>' +
          '</div></div>';
      } else {
        var list = "";
        for (var i = 0; i < rooms.length; i++) list += roomCard(rooms[i]);
        body = '<div class="om-body">' + filterBar + list +
          '<div class="om-scr-explore-registerbanner om-press" data-action="sponsor-register">' +
          OM.ui.icon("building", 22, "#fff") +
          '<div><div class="t1">우리 매장을 스폰서로 등록할까요?</div><div class="t2">쿠폰 예산을 걸고 모임에 노출돼요</div></div>' +
          '</div></div>';
      }
    }

    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("탐색", "모집 중인 모임", false) + body +
      '<button class="om-btn om-scr-explore-fab om-press" data-action="new-room">' + OM.ui.icon("bolt", 14, "#fff") + ' 새 모임</button>' +
      (toastMsg ? '<div class="om-toast">' + toastMsg + '</div>' : "");
  }

  OM.register("explore", {
    title: "탐색",
    render: render,
    onEnter: function (params) {
      loaded = false;
      if (loadTimer) clearTimeout(loadTimer);
      loadTimer = setTimeout(function () {
        loaded = true;
        if (lastEl) render(lastEl, lastParams);
      }, 420);
    },
    onLeave: function () {
      if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
      if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
    }
  });

  // Delegated click handling — bound once on document, filtered by closest
  // ancestor screen check so it only reacts while "explore" is the mounted
  // route's own elements (data-action values are unique to this module).
  document.addEventListener("click", function (e) {
    var filterBtn = e.target.closest ? e.target.closest("[data-filter]") : null;
    if (filterBtn && lastEl && lastEl.contains(filterBtn)) {
      filterMode = filterBtn.getAttribute("data-filter");
      render(lastEl, lastParams);
      return;
    }
    var newRoomBtn = e.target.closest ? e.target.closest('[data-action="new-room"]') : null;
    if (newRoomBtn && lastEl && lastEl.contains(newRoomBtn)) { OM.go("home", {}); return; }

    var sponsorBannerBtn = e.target.closest ? e.target.closest('[data-action="sponsor-register"]') : null;
    if (sponsorBannerBtn && lastEl && lastEl.contains(sponsorBannerBtn)) { OM.go("sponsor-register", {}); return; }

    var offerBtn = e.target.closest ? e.target.closest('[data-action="offer"]') : null;
    if (offerBtn && lastEl && lastEl.contains(offerBtn)) { OM.go("sponsor-offer", { roomId: offerBtn.getAttribute("data-room") }); return; }

    var previewCard = e.target.closest ? e.target.closest('[data-action="preview"]') : null;
    if (previewCard && lastEl && lastEl.contains(previewCard)) { OM.go("room-preview", { roomId: previewCard.getAttribute("data-room") }); return; }
  });
})();

/* =============================== room-preview =============================== */
(function () {
  var toastMsg = null;
  var toastTimer = null;
  var lastEl = null, lastParams = null;

  function flashToast(msg) {
    toastMsg = msg;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastMsg = null;
      if (lastEl) render(lastEl, lastParams);
    }, 1600);
    if (lastEl) render(lastEl, lastParams);
  }

  function joinFailMessage(reason) {
    if (reason === "already-joined") return "이미 참여 중인 모임이에요.";
    if (reason === "full") return "정원이 가득 찼어요.";
    if (reason === "not-open") return "모집이 종료된 모임이에요.";
    return "참여할 수 없어요.";
  }

  function render(el, params) {
    lastEl = el; lastParams = params;
    var room = null;
    for (var i = 0; i < OM.state.rooms.length; i++) if (OM.state.rooms[i].id === params.roomId) room = OM.state.rooms[i];

    if (!room) {
      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("모임 미리보기", "", true) +
        '<div class="om-body"><div class="om-scr-explore-empty">' +
        OM.ui.icon("warn", 30, "#E05A5A") +
        '<div class="headline">모임을 찾을 수 없어요</div>' +
        '<div class="sub">삭제되었거나 잘못된 링크예요.</div>' +
        '<button class="om-btn secondary auto om-press" style="margin-top:16px;" data-om-back="1">뒤로 가기</button>' +
        '</div></div>';
      return;
    }

    var me = null;
    for (var j = 0; j < room.participants.length; j++) if (room.participants[j].id === "me") me = room.participants[j];

    var avatars = "";
    var showCount = Math.min(room.participants.length, 5);
    for (var k = 0; k < showCount; k++) avatars += '<div class="om-scr-preview-avatar">' + room.participants[k].name.charAt(0) + '</div>';
    for (var e2 = showCount; e2 < room.capacity; e2++) avatars += '<div class="om-scr-preview-avatar empty">?</div>';

    var onlineLabel = room.online === "online" ? "온라인" : "오프라인";
    var tagsHtml = "";
    for (var t = 0; t < room.tags.length; t++) tagsHtml += OM.ui.chip("grey", "#" + room.tags[t]);

    var statusChip = "";
    if (room.status === "confirmed") statusChip = OM.ui.chip("blue", "확정됨");
    else if (room.status === "exploded") statusChip = OM.ui.chip("red", "방폭됨");
    else if (room.status === "checkin-done" || room.status === "settled") statusChip = OM.ui.chip("grey", "종료됨");
    else statusChip = OM.ui.chip("green", "모집 중");

    var ctaHtml;
    if (me) {
      ctaHtml = '<button class="om-btn secondary om-press" data-action="go-chat">채팅방으로 이동</button>';
    } else if (room.status !== "recruiting") {
      ctaHtml = '<button class="om-btn om-press" disabled>참여할 수 없는 모임이에요</button>';
    } else {
      ctaHtml = '<button class="om-btn om-press" data-action="join">참여하기 (500P 예치)</button>';
    }

    var couponStrip = room.sponsored
      ? '<div class="om-scr-preview-couponstrip" data-action="offer">' +
        OM.ui.icon("percent", 16, "#8A5A16") +
        '<div class="txt">이 모임은 스폰서 쿠폰 대상이에요 · ' + (room.couponPercent || 15) + '% 할인</div>' +
        OM.ui.icon("back", 12, "#8A5A16") + '</div>'
      : "";

    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("모임 미리보기", room.slotLabel, true) +
      '<div class="om-body">' +
      '<div class="om-card om-scr-preview-hero">' +
      statusChip +
      '<div class="title">' + room.title + '</div>' +
      '<div class="slot">' + room.slotLabel + ' · ' + onlineLabel + '</div>' +
      '<div class="om-scr-preview-avatars">' + avatars + '</div>' +
      OM.ui.gauge(100 * room.participants.length / room.capacity) +
      '<div style="font-size:11px; color:var(--muted); font-weight:700; margin-top:6px;">' + room.participants.length + ' / ' + room.capacity + '명 모집</div>' +
      '</div>' +
      '<div class="om-card">' +
      '<div class="om-scr-explore-tagrow">' + tagsHtml + '</div>' +
      '<div class="om-scr-preview-infogrid">' +
      '<div class="cell"><div class="k">일정</div><div class="v">' + room.slotLabel + '</div></div>' +
      '<div class="cell"><div class="k">방식</div><div class="v">' + onlineLabel + '</div></div>' +
      '</div>' +
      couponStrip +
      '</div>' +
      ctaHtml +
      '</div>' +
      (toastMsg ? '<div class="om-toast">' + toastMsg + '</div>' : "");
  }

  OM.register("room-preview", {
    title: "모임 미리보기",
    render: render,
    onEnter: function () {},
    onLeave: function () { if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; } }
  });

  document.addEventListener("click", function (e) {
    var joinBtn = e.target.closest ? e.target.closest('[data-action="join"]') : null;
    if (joinBtn && lastEl && lastEl.contains(joinBtn) && lastParams) {
      var res = OM.sim.joinRoom(lastParams.roomId);
      if (res.ok) OM.go("deposit", { roomId: lastParams.roomId });
      else flashToast(joinFailMessage(res.reason));
      return;
    }
    var chatBtn = e.target.closest ? e.target.closest('[data-action="go-chat"]') : null;
    if (chatBtn && lastEl && lastEl.contains(chatBtn) && lastParams) { OM.go("room-chat", { roomId: lastParams.roomId }); return; }

    var offerStrip = e.target.closest ? e.target.closest('[data-action="offer"]') : null;
    if (offerStrip && lastEl && lastEl.contains(offerStrip) && lastParams) { OM.go("sponsor-offer", { roomId: lastParams.roomId }); return; }
  });
})();

/* =============================== sponsor-offer =============================== */
(function () {
  var toastMsg = null;
  var toastTimer = null;
  var lastEl = null, lastParams = null;

  function flashToast(msg) {
    toastMsg = msg;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastMsg = null;
      if (lastEl) render(lastEl, lastParams);
    }, 1600);
    if (lastEl) render(lastEl, lastParams);
  }

  function render(el, params) {
    lastEl = el; lastParams = params;
    var room = null;
    for (var i = 0; i < OM.state.rooms.length; i++) if (OM.state.rooms[i].id === params.roomId) room = OM.state.rooms[i];

    if (!room || !room.sponsored) {
      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("스폰서 쿠폰", "", true) +
        '<div class="om-body"><div class="om-scr-explore-empty">' +
        OM.ui.icon("warn", 30, "#E05A5A") +
        '<div class="headline">쿠폰 정보를 찾을 수 없어요</div>' +
        '<div class="sub">스폰서드 모임이 아니거나 삭제되었어요.</div>' +
        '<button class="om-btn secondary auto om-press" style="margin-top:16px;" data-om-back="1">뒤로 가기</button>' +
        '</div></div>';
      return;
    }

    var pct = room.couponPercent || 15;
    var budget = room.sponsorBudget || 0;
    var discountAmount = Math.round(500 * pct / 100);
    var applied = !!room.couponApplied;
    var used = OM.state.rooms.filter(function (r) { return r.sponsored && r.couponApplied; }).length * discountAmount;
    var budgetPct = budget > 0 ? Math.min(100, 100 * used / budget) : 0;

    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("스폰서 쿠폰", room.title, true) +
      '<div class="om-body">' +
      '<div class="om-card om-scr-offer-hero">' +
      OM.ui.chip("amber", "스폰서드") +
      '<div class="om-scr-offer-pct">' + pct + '<span>% 할인</span></div>' +
      '<div style="font-size:12px; color:var(--muted); font-weight:700; margin-top:4px;">' + room.title + ' · ' + room.slotLabel + '</div>' +
      '</div>' +
      '<div class="om-card">' +
      '<div class="om-scr-offer-row"><span class="k">기본 예치금</span><span class="v">500P</span></div>' +
      '<div class="om-scr-offer-row"><span class="k">쿠폰 할인</span><span class="v">-' + discountAmount + 'P</span></div>' +
      '<div class="om-scr-offer-row"><span class="k">예치 후 실부담</span><span class="v">' + (500 - discountAmount) + 'P</span></div>' +
      '</div>' +
      '<div class="om-card">' +
      '<div style="font-size:11.5px; font-weight:800; color:var(--ink2); margin-bottom:4px;">스폰서 예산 소진율 (데모)</div>' +
      '<div class="om-scr-offer-budgetbar"><i style="width:' + budgetPct + '%"></i></div>' +
      '<div style="font-size:10.5px; color:var(--muted); font-weight:700; margin-top:6px;">예산 ' + budget + 'P 중 ' + used + 'P 사용</div>' +
      '</div>' +
      (applied
        ? '<button class="om-btn secondary om-press" disabled>' + OM.ui.icon("check", 14, "#2F5EDB") + ' 쿠폰 적용됨</button>'
        : '<button class="om-btn om-press" data-action="apply">쿠폰 적용하기</button>') +
      '<button class="om-btn ghost om-press" style="margin-top:8px;" data-action="go-preview">모임 보러 가기</button>' +
      '</div>' +
      (toastMsg ? '<div class="om-toast">' + toastMsg + '</div>' : "");
  }

  OM.register("sponsor-offer", {
    title: "스폰서 쿠폰",
    render: render,
    onEnter: function () {},
    onLeave: function () { if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; } }
  });

  document.addEventListener("click", function (e) {
    var applyBtn = e.target.closest ? e.target.closest('[data-action="apply"]') : null;
    if (applyBtn && lastEl && lastEl.contains(applyBtn) && lastParams) {
      var res = OM.sim.applyCoupon(lastParams.roomId);
      flashToast(res.ok ? "쿠폰이 적용되었어요." : "쿠폰을 적용할 수 없어요.");
      return;
    }
    var previewBtn = e.target.closest ? e.target.closest('[data-action="go-preview"]') : null;
    if (previewBtn && lastEl && lastEl.contains(previewBtn) && lastParams) { OM.go("room-preview", { roomId: lastParams.roomId }); return; }
  });
})();

/* =============================== sponsor-register =============================== */
(function () {
  var ALL_TAGS = ["매운맛", "커피챗", "베이커리", "러닝", "채식", "보드게임"];
  var PCT_OPTIONS = [10, 15, 20, 30];

  var step = 0; // 0 target, 1 budget, 2 review, 3 done
  var form = { title: "", tags: [], capacity: 3, online: "offline", budget: 3000, couponPercent: 15 };
  var doneRoomId = null;
  var toastMsg = null;
  var toastTimer = null;
  var lastEl = null, lastParams = null;

  function resetForm() {
    step = 0;
    form = { title: "", tags: [], capacity: 3, online: "offline", budget: 3000, couponPercent: 15 };
    doneRoomId = null;
  }

  function flashToast(msg) {
    toastMsg = msg;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastMsg = null;
      if (lastEl) render(lastEl, lastParams);
    }, 1600);
    if (lastEl) render(lastEl, lastParams);
  }

  function stepValid(s) {
    if (s === 0) return form.title.length > 0 && form.tags.length > 0 && form.capacity >= 2;
    if (s === 1) return form.budget >= 500;
    return true;
  }

  function renderStep0() {
    var tagBtns = "";
    for (var i = 0; i < ALL_TAGS.length; i++) {
      var tg = ALL_TAGS[i];
      var active = form.tags.indexOf(tg) !== -1;
      tagBtns += '<button class="om-scr-reg-tagbtn om-press' + (active ? " active" : "") + '" data-tag="' + tg + '">#' + tg + '</button>';
    }
    return '<div class="om-scr-reg-field"><div class="om-scr-reg-label">모임 이름</div>' +
      '<input class="om-scr-reg-input" id="omRegTitle" type="text" placeholder="예: 신메뉴 시식 점심" value="' + form.title + '" />' +
      '</div>' +
      '<div class="om-scr-reg-field"><div class="om-scr-reg-label">타깃 관심 태그</div>' +
      '<div class="om-scr-reg-taggrid">' + tagBtns + '</div></div>' +
      '<div class="om-scr-reg-field"><div class="om-scr-reg-label">모집 인원</div>' +
      '<div class="om-scr-reg-counter">' +
      '<button class="om-press" data-action="cap-minus">–</button>' +
      '<span class="num">' + form.capacity + '명</span>' +
      '<button class="om-press" data-action="cap-plus">+</button>' +
      '</div></div>' +
      '<div class="om-scr-reg-field"><div class="om-scr-reg-label">진행 방식</div>' +
      '<div class="om-scr-reg-taggrid">' +
      '<button class="om-scr-reg-tagbtn om-press' + (form.online === "offline" ? " active" : "") + '" data-online="offline">오프라인</button>' +
      '<button class="om-scr-reg-tagbtn om-press' + (form.online === "online" ? " active" : "") + '" data-online="online">온라인</button>' +
      '</div></div>';
  }

  function renderStep1() {
    var pctBtns = "";
    for (var i = 0; i < PCT_OPTIONS.length; i++) {
      var p = PCT_OPTIONS[i];
      pctBtns += '<button class="om-scr-reg-pctbtn om-press' + (form.couponPercent === p ? " active" : "") + '" data-pct="' + p + '">' + p + '%</button>';
    }
    return '<div class="om-scr-reg-field"><div class="om-scr-reg-label">쿠폰 예산 (포인트)</div>' +
      '<div class="om-scr-reg-counter">' +
      '<button class="om-press" data-action="budget-minus">–</button>' +
      '<span class="num">' + form.budget + 'P</span>' +
      '<button class="om-press" data-action="budget-plus">+</button>' +
      '</div></div>' +
      '<div class="om-scr-reg-field"><div class="om-scr-reg-label">참여자 할인율</div>' +
      '<div class="om-scr-reg-pctgrid">' + pctBtns + '</div></div>' +
      '<div class="om-card" style="background:#F5F7FC; box-shadow:none;">' +
      '<div style="font-size:11px; color:var(--muted); font-weight:700; line-height:1.6;">예산 ' + form.budget + 'P로 1인당 ' +
      Math.round(500 * form.couponPercent / 100) + 'P 할인 쿠폰을 약 ' +
      Math.max(1, Math.floor(form.budget / Math.max(1, Math.round(500 * form.couponPercent / 100)))) + '건 지원할 수 있어요.</div>' +
      '</div>';
  }

  function renderStep2() {
    var tagsLabel = form.tags.map(function (t) { return "#" + t; }).join(" ");
    return '<div class="om-card">' +
      '<div class="om-scr-reg-summaryrow"><span class="k">모임 이름</span><span class="v">' + (form.title || "-") + '</span></div>' +
      '<div class="om-scr-reg-summaryrow"><span class="k">타깃 태그</span><span class="v">' + (tagsLabel || "-") + '</span></div>' +
      '<div class="om-scr-reg-summaryrow"><span class="k">모집 인원</span><span class="v">' + form.capacity + '명</span></div>' +
      '<div class="om-scr-reg-summaryrow"><span class="k">진행 방식</span><span class="v">' + (form.online === "online" ? "온라인" : "오프라인") + '</span></div>' +
      '<div class="om-scr-reg-summaryrow"><span class="k">쿠폰 예산</span><span class="v">' + form.budget + 'P</span></div>' +
      '<div class="om-scr-reg-summaryrow"><span class="k">할인율</span><span class="v">' + form.couponPercent + '%</span></div>' +
      '</div>' +
      '<div style="font-size:11px; color:var(--muted); font-weight:700; line-height:1.6; padding:0 4px;">제출하면 탐색 피드에 스폰서드 배지가 붙은 모임으로 즉시 노출돼요. (데모 — 실제 과금 없음)</div>';
  }

  function renderStep3() {
    return '<div class="om-scr-reg-donewrap">' +
      '<div class="circle">' + OM.ui.icon("check", 28, "#22A06B") + '</div>' +
      '<div class="headline">스폰서 등록 완료!</div>' +
      '<div class="sub">"' + (form.title || "새 모임") + '"이 탐색 피드에 스폰서드로 노출되기 시작했어요.</div>' +
      '</div>';
  }

  function render(el, params) {
    lastEl = el; lastParams = params;
    var appTitle = step === 3 ? "등록 완료" : "사업자 스폰서 등록";
    var body;
    if (step === 3) body = renderStep3();
    else {
      var content = step === 0 ? renderStep0() : (step === 1 ? renderStep1() : renderStep2());
      body = OM.ui.stepperDots(3, step) + content;
    }

    var footer;
    if (step === 3) {
      footer = '<div class="om-scr-reg-footer">' +
        '<button class="om-btn secondary om-press" data-action="go-explore">탐색 피드에서 보기</button>' +
        '</div>';
    } else {
      var nextLabel = step === 2 ? "제출하기" : "다음";
      var disabled = !stepValid(step) ? " disabled" : "";
      footer = '<div class="om-scr-reg-footer">' +
        (step > 0 ? '<button class="om-btn ghost om-press" data-action="prev">이전</button>' : "") +
        '<button class="om-btn om-press" data-action="next"' + disabled + '>' + nextLabel + '</button>' +
        '</div>';
    }

    el.innerHTML = OM.ui.statusBar() + OM.ui.appBar(appTitle, "", true) +
      '<div class="om-body">' + body + footer + '</div>' +
      (toastMsg ? '<div class="om-toast">' + toastMsg + '</div>' : "");

    var titleInput = el.querySelector ? el.querySelector("#omRegTitle") : null;
    if (titleInput) {
      titleInput.addEventListener("input", function (ev) { form.title = ev.target.value; });
    }
  }

  OM.register("sponsor-register", {
    title: "사업자 스폰서 등록",
    render: render,
    onEnter: function () { resetForm(); },
    onLeave: function () { if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; } }
  });

  document.addEventListener("click", function (e) {
    if (!lastEl || !lastEl.contains(e.target)) return;

    var tagBtn = e.target.closest ? e.target.closest("[data-tag]") : null;
    if (tagBtn) {
      var tg = tagBtn.getAttribute("data-tag");
      var idx = form.tags.indexOf(tg);
      if (idx === -1) form.tags.push(tg); else form.tags.splice(idx, 1);
      render(lastEl, lastParams);
      return;
    }
    var onlineBtn = e.target.closest ? e.target.closest("[data-online]") : null;
    if (onlineBtn) { form.online = onlineBtn.getAttribute("data-online"); render(lastEl, lastParams); return; }

    var pctBtn = e.target.closest ? e.target.closest("[data-pct]") : null;
    if (pctBtn) { form.couponPercent = Number(pctBtn.getAttribute("data-pct")); render(lastEl, lastParams); return; }

    var capMinus = e.target.closest ? e.target.closest('[data-action="cap-minus"]') : null;
    if (capMinus) { form.capacity = Math.max(2, form.capacity - 1); render(lastEl, lastParams); return; }
    var capPlus = e.target.closest ? e.target.closest('[data-action="cap-plus"]') : null;
    if (capPlus) { form.capacity = Math.min(12, form.capacity + 1); render(lastEl, lastParams); return; }

    var budgetMinus = e.target.closest ? e.target.closest('[data-action="budget-minus"]') : null;
    if (budgetMinus) { form.budget = Math.max(500, form.budget - 500); render(lastEl, lastParams); return; }
    var budgetPlus = e.target.closest ? e.target.closest('[data-action="budget-plus"]') : null;
    if (budgetPlus) { form.budget = Math.min(50000, form.budget + 500); render(lastEl, lastParams); return; }

    var prevBtn = e.target.closest ? e.target.closest('[data-action="prev"]') : null;
    if (prevBtn) { step = Math.max(0, step - 1); render(lastEl, lastParams); return; }

    var nextBtn = e.target.closest ? e.target.closest('[data-action="next"]') : null;
    if (nextBtn) {
      if (!stepValid(step)) { flashToast("필수 항목을 채워주세요."); return; }
      if (step === 2) {
        doneRoomId = OM.sim.registerSponsor({
          title: form.title, slotLabel: "협의 예정", tags: form.tags,
          capacity: form.capacity, budget: form.budget, couponPercent: form.couponPercent
        });
        step = 3;
      } else {
        step = step + 1;
      }
      render(lastEl, lastParams);
      return;
    }

    var goExploreBtn = e.target.closest ? e.target.closest('[data-action="go-explore"]') : null;
    if (goExploreBtn) { OM.go("explore", {}); return; }
  });
})();
</script>
<script>
(function () {
  "use strict";

  /* ---------------------------------------------------------------
   * shared helpers
   * --------------------------------------------------------------- */
  function showToast(el, msg) {
    var old = el.querySelector(".om-toast");
    if (old && old.parentNode) old.parentNode.removeChild(old);
    var t = document.createElement("div");
    t.className = "om-toast";
    t.textContent = msg;
    el.appendChild(t);
    setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 1600);
  }

  var TRUST_MAP = {
    "상": { pct: 92, color: "var(--good)", chip: "green", label: "상" },
    "중": { pct: 58, color: "var(--brand)", chip: "blue", label: "중" },
    "하": { pct: 26, color: "var(--danger)", chip: "red", label: "하" }
  };
  function trustInfo(trust) { return TRUST_MAP[trust] || TRUST_MAP["중"]; }
  function trustRing(trust) {
    var info = trustInfo(trust);
    var deg = Math.round(3.6 * info.pct);
    return '<div class="om-e-ring" style="background:conic-gradient(' + info.color + ' 0deg ' + deg + 'deg, #EEF1F8 ' + deg + 'deg 360deg);"><span>' + info.label + '</span></div>';
  }

  var STATUS_LABEL = {
    recruiting: ["모집 중", "amber"],
    confirmed: ["확정", "blue"],
    exploded: ["방폭", "grey"],
    "checkin-done": ["체크인 완료", "green"],
    settled: ["정산 완료", "green"]
  };
  function statusChip(status) {
    var s = STATUS_LABEL[status] || ["-", "grey"];
    return OM.ui.chip(s[1], s[0]);
  }

  var LEDGER_TYPE = {
    deposit: { label: "예치", icon: "lock", color: "#2F5EDB" },
    refund: { label: "환급", icon: "check", color: "#22A06B" },
    forfeit: { label: "몰수", icon: "warn", color: "#E05A5A" },
    settle: { label: "정산", icon: "receipt", color: "#2F5EDB" },
    bonus: { label: "적립", icon: "shield", color: "#22A06B" },
    topup: { label: "충전", icon: "percent", color: "#7C5CC4" }
  };
  function ledgerMeta(type) { return LEDGER_TYPE[type] || { label: type, icon: "bolt", color: "#8892AE" }; }
  function ticksAgoLabel(tick) {
    var diff = OM.state.tick - tick;
    if (diff <= 0) return "방금";
    return diff + "틱 전";
  }
  function findRoom(roomId) {
    if (!roomId) return null;
    var rooms = OM.state.rooms;
    for (var i = 0; i < rooms.length; i++) if (rooms[i].id === roomId) return rooms[i];
    return null;
  }

  /* =================================================================
   * my — 포인트 지갑 · 신뢰도 · 이번 시즌 통계 · 참여 이력
   * ================================================================= */
  OM.register("my", {
    title: "마이페이지",
    render: function (el, params) {
      var u = OM.state.user;
      var myRooms = OM.state.rooms.filter(function (r) {
        for (var i = 0; i < r.participants.length; i++) if (r.participants[i].id === "me") return true;
        return false;
      });
      var earned = 0;
      for (var i = 0; i < OM.state.ledger.length; i++) {
        var e = OM.state.ledger[i];
        if (e.amount > 0) earned += e.amount;
      }
      var unread = 0;
      for (var j = 0; j < OM.state.notifications.length; j++) if (!OM.state.notifications[j].read) unread++;

      var historyHtml = "";
      if (!myRooms.length) {
        historyHtml = '<div class="om-e-empty">' + OM.ui.icon("compass", 26, "#8892AE") +
          '<div style="margin-top:8px;">아직 참여한 모임이 없어요.<br>탐색에서 첫 모임을 찾아볼까요?</div></div>';
      } else {
        var rows = myRooms.slice().sort(function (a, b) { return b.createdTick - a.createdTick; });
        for (var k = 0; k < rows.length; k++) {
          var r = rows[k];
          historyHtml += '<div class="om-e-row om-press" data-action="my-open-room" data-room="' + r.id + '">' +
            '<div class="ic">' + OM.ui.icon(r.online === "online" ? "video" : "building", 17, "#2F5EDB") + '</div>' +
            '<div class="mid"><div class="t1">' + r.title + '</div><div class="t2">' + r.slotLabel + ' · ' + r.tags.join(", ") + '</div></div>' +
            statusChip(r.status) +
            '</div>';
        }
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("마이페이지", u.name + " · " + u.dept, false) +
        '<div class="om-body">' +
        '<div class="om-card">' +
        '<div style="font-size:11px; color:var(--muted); font-weight:700;">포인트 지갑</div>' +
        '<div style="display:flex; align-items:baseline; gap:6px; margin-top:4px;">' +
        '<div style="font-size:24px; font-weight:800; color:var(--ink);">' + u.points.toLocaleString() + '</div>' +
        '<div style="font-size:12px; color:var(--muted);">P</div></div>' +
        '<div style="display:flex; gap:8px; margin-top:10px;">' +
        '<button class="om-btn auto om-press" data-action="my-topup">+1,000P 충전</button>' +
        '<button class="om-btn ghost auto om-press" data-action="my-goto-ledger">원장 보기</button>' +
        '</div>' +
        '<div style="font-size:10.5px; color:var(--muted); margin-top:8px;">데모용 가상 포인트예요. 실제 결제는 이루어지지 않아요.</div>' +
        '</div>' +

        '<div class="om-card">' +
        '<div style="font-size:11px; color:var(--muted); font-weight:700; margin-bottom:10px;">신뢰도</div>' +
        '<div class="om-e-ring-wrap">' + trustRing(u.trust) +
        '<div>' + OM.ui.chip(trustInfo(u.trust).chip, "신뢰도 " + u.trust) +
        '<div style="font-size:11px; color:var(--muted); margin-top:6px;">누적 노쇼 ' + u.noshowCount + '회</div></div>' +
        '</div>' +
        '</div>' +

        '<div class="om-card">' +
        '<div style="font-size:11px; color:var(--muted); font-weight:700;">이번 시즌 통계</div>' +
        '<div class="om-e-stat-grid">' +
        '<div class="om-e-stat"><div class="n">' + myRooms.length + '</div><div class="l">참여 모임</div></div>' +
        '<div class="om-e-stat"><div class="n">' + u.noshowCount + '</div><div class="l">노쇼</div></div>' +
        '<div class="om-e-stat"><div class="n">' + earned.toLocaleString() + '</div><div class="l">누적 적립 P</div></div>' +
        '</div></div>' +

        '<div class="om-e-quick">' +
        '<button class="om-press" data-action="my-goto-ledger">' + OM.ui.icon("receipt", 18, "#2F5EDB") + '<span>포인트 원장</span></button>' +
        '<button class="om-press" data-action="my-goto-notif">' + OM.ui.icon("bell", 18, "#2F5EDB") + '<span>알림함</span>' +
        (unread ? '<span class="badge">' + (unread > 9 ? "9+" : unread) + '</span>' : '') + '</button>' +
        '</div>' +

        '<div class="om-e-section-h"><div class="t">참여 이력</div></div>' +
        historyHtml +
        '</div>';
    },
    onEnter: function () {},
    onLeave: function () {}
  });

  document.addEventListener("click", function (ev) {
    // Global delegated handler kept simple per-screen via closest() checks below,
    // scoped so it only reacts inside the currently mounted "my"/"ledger"/"notifications" screens.
    var t = ev.target.closest ? ev.target.closest("[data-action]") : null;
    if (!t) return;
    var screenEl = t.closest(".om-screen");
    if (!screenEl) return;
    var action = t.getAttribute("data-action");

    if (action === "my-topup") {
      OM.sim.topUpPoints(1000);
      showToast(screenEl, "1,000P 충전했어요");
    } else if (action === "my-goto-ledger") {
      OM.go("ledger", {});
    } else if (action === "my-goto-notif") {
      OM.go("notifications", {});
    } else if (action === "my-open-room") {
      var roomId = t.getAttribute("data-room");
      if (findRoom(roomId)) OM.go("room-detail", { roomId: roomId });
      else showToast(screenEl, "연결된 모임을 찾을 수 없어요");
    } else if (action === "ledger-filter") {
      LEDGER_FILTER = t.getAttribute("data-filter");
      OM.go("ledger", {}, { replace: true });
    } else if (action === "ledger-open") {
      var lrId = t.getAttribute("data-room");
      if (findRoom(lrId)) OM.go("room-detail", { roomId: lrId });
      else showToast(screenEl, "연결된 모임을 찾을 수 없어요");
    } else if (action === "notif-mark-all") {
      OM.sim.markAllNotificationsRead();
      showToast(screenEl, "모두 읽음으로 표시했어요");
    } else if (action === "notif-open") {
      var nid = t.getAttribute("data-notif");
      var list = OM.state.notifications;
      var notif = null;
      for (var i = 0; i < list.length; i++) if (list[i].id === nid) notif = list[i];
      if (!notif) return;
      OM.sim.markNotificationRead(nid);
      if (notif.roomId) {
        var room = findRoom(notif.roomId);
        if (room) OM.go("room-detail", { roomId: notif.roomId });
        else showToast(screenEl, "연결된 모임을 찾을 수 없어요 (이미 종료됐을 수 있어요)");
      } else {
        showToast(screenEl, "읽음으로 표시했어요");
      }
    }
  });

  /* =================================================================
   * ledger — 원장 전체 내역 · 필터 칩
   * ================================================================= */
  var LEDGER_FILTER = "all";
  var LEDGER_FILTERS = [
    ["all", "전체"], ["deposit", "예치"], ["refund", "환급"],
    ["forfeit", "몰수"], ["settle", "정산"], ["bonus", "적립"], ["topup", "충전"]
  ];

  OM.register("ledger", {
    title: "원장 상세",
    render: function (el, params) {
      var all = OM.state.ledger.slice().sort(function (a, b) { return b.tick - a.tick; });
      var filtered = LEDGER_FILTER === "all" ? all : all.filter(function (e) { return e.type === LEDGER_FILTER; });

      var totalIn = 0, totalOut = 0;
      for (var i = 0; i < all.length; i++) {
        if (all[i].amount > 0) totalIn += all[i].amount; else totalOut += -all[i].amount;
      }

      var filterHtml = '<div class="om-e-filters">';
      for (var f = 0; f < LEDGER_FILTERS.length; f++) {
        var id = LEDGER_FILTERS[f][0], label = LEDGER_FILTERS[f][1];
        var active = id === LEDGER_FILTER;
        filterHtml += '<button class="om-chip om-press ' + (active ? "blue" : "grey") + '" data-action="ledger-filter" data-filter="' + id + '">' + label + '</button>';
      }
      filterHtml += '</div>';

      var listHtml = "";
      if (!all.length) {
        listHtml = '<div class="om-e-empty">' + OM.ui.icon("receipt", 26, "#8892AE") +
          '<div style="margin-top:8px;">아직 원장 내역이 없어요.<br>모임에 참여하면 여기 쌓여요.</div></div>';
      } else if (!filtered.length) {
        listHtml = '<div class="om-e-empty">해당 유형의 내역이 없어요.</div>';
      } else {
        for (var k = 0; k < filtered.length; k++) {
          var e2 = filtered[k];
          var meta = ledgerMeta(e2.type);
          var room = findRoom(e2.roomId);
          var pos = e2.amount >= 0;
          listHtml += '<div class="om-e-row om-press" data-action="ledger-open" data-room="' + (e2.roomId || "") + '">' +
            '<div class="ic">' + OM.ui.icon(meta.icon, 16, meta.color) + '</div>' +
            '<div class="mid"><div class="t1">' + e2.note + '</div>' +
            '<div class="t2">' + meta.label + (room ? " · " + room.title : "") + ' · ' + ticksAgoLabel(e2.tick) + '</div></div>' +
            '<div class="amt ' + (pos ? "pos" : "neg") + '">' + (pos ? "+" : "") + e2.amount.toLocaleString() + 'P</div>' +
            '</div>';
        }
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("원장 상세", "전체 내역", true) +
        '<div class="om-body">' +
        '<div class="om-card">' +
        '<div class="om-e-summary">' +
        '<div><div class="n" style="color:var(--good-dark);">+' + totalIn.toLocaleString() + '</div><div class="l">누적 적립</div></div>' +
        '<div><div class="n" style="color:#A32E2E;">-' + totalOut.toLocaleString() + '</div><div class="l">누적 사용</div></div>' +
        '<div><div class="n" style="color:var(--ink);">' + OM.state.user.points.toLocaleString() + '</div><div class="l">현재 잔액</div></div>' +
        '</div></div>' +
        filterHtml +
        listHtml +
        '</div>';
    },
    onEnter: function () { LEDGER_FILTER = LEDGER_FILTER || "all"; },
    onLeave: function () {}
  });

  /* =================================================================
   * notifications — 알림함
   * ================================================================= */
  OM.register("notifications", {
    title: "알림함",
    render: function (el, params) {
      var list = OM.state.notifications;
      var unread = 0;
      for (var i = 0; i < list.length; i++) if (!list[i].read) unread++;

      var listHtml = "";
      if (!list.length) {
        listHtml = '<div class="om-e-empty">' + OM.ui.icon("bell", 26, "#8892AE") +
          '<div style="margin-top:8px;">아직 받은 알림이 없어요.</div></div>';
      } else {
        for (var k = 0; k < list.length; k++) {
          var n = list[k];
          listHtml += '<div class="om-e-row om-press ' + (n.read ? "" : "unread") + '" data-action="notif-open" data-notif="' + n.id + '">' +
            '<div class="ic">' + OM.ui.icon(n.icon, 17, n.iconColor) + '</div>' +
            '<div class="mid"><div class="t1">' + n.title + '</div><div class="t2">' + n.time + '</div></div>' +
            (n.read ? "" : '<span class="dot"></span>') +
            '</div>';
        }
      }

      el.innerHTML = OM.ui.statusBar() + OM.ui.appBar("알림함", unread ? "안 읽은 알림 " + unread + "개" : "모두 읽음", true) +
        '<div class="om-body">' +
        '<div class="om-e-section-h"><div class="t">봇 알림 이력</div>' +
        (unread ? '<a class="om-press" data-action="notif-mark-all">모두 읽음 처리</a>' : '') +
        '</div>' +
        listHtml +
        '</div>';
    },
    onEnter: function () {},
    onLeave: function () {}
  });
})();
</script>
</body>
</html>
