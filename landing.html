<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OfficeMate — 메인으로 이동</title>
<meta http-equiv="refresh" content="0; url=./">
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: #EEF0F3; color: #4A4959;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-size: 14px; }
  a { color: #2A4784; font-weight: 700; }
</style>
</head>
<body>
<!-- 랜딩 페이지가 메인(/)으로 승격되어, 이 주소는 구 링크 호환용 리다이렉트만 남습니다.
     namo 배포는 head를 버리고 body만 옮기므로 meta refresh 외에 body 스크립트로도 이동시키며,
     namo가 사이트를 서브패스(/ba4) 아래에 서빙하므로 홈 경로는 자기 경로에서 계산합니다. -->
<p>메인 페이지로 이동합니다… <a href="./">바로 가기</a></p>
<script>
  var base = location.pathname.replace(/landing\/?$/, "") || "/";
  location.replace(base + location.search + location.hash);
</script>
</body>
</html>
